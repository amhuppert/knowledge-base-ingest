<style>

<script id="docs-data" type="application/json">[{"id":"overview","title":"Overview","html":"\u003ch1 id=\"overview-knowledge-base-ingest\">knowledge-base-ingest\u003c/h1>\n\u003cp>An agent-driven knowledge base: an AI coding agent (Claude Code) uses the \u003ccode>kb\u003c/code> CLI to\n\u003cstrong>create\u003c/strong>, \u003cstrong>maintain\u003c/strong>, and \u003cstrong>ingest into\u003c/strong> a knowledge base built from source material —\nwith \u003cstrong>strict, verifiable provenance\u003c/strong> and a \u003cstrong>human-readable\u003c/strong> markdown view.\u003c/p>\n\u003cp>Optimized for technical documentation and software-engineering material; general enough for\nother subjects.\u003c/p>\n\u003ch2 id=\"overview-core-idea\">Core idea \u003ca class=\"anchor\" href=\"#overview-core-idea\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cul>\n\u003cli>\u003cstrong>SQLite (\u003ccode>kb.sqlite\u003c/code>) is the source of truth\u003c/strong> for everything derived: the synthesis\ntree, claims, provenance edges, and the knowledge graph.\u003c/li>\n\u003cli>\u003cstrong>Source documents are immutable\u003c/strong>, content-addressed copies under \u003ccode>sources/\u003c/code>, segregated\nfrom anything generated.\u003c/li>\n\u003cli>\u003cstrong>The markdown under \u003ccode>kb/\u003c/code> is a deterministic, read-only render\u003c/strong> of the database — the\nhuman view. Regenerate it with \u003ccode>kb render\u003c/code>; never hand-edit it.\u003c/li>\n\u003cli>\u003cstrong>Provenance is an enforced invariant, not a convention.\u003c/strong> Every claim must cite an exact\nquote from a source; the CLI verifies the quote against the immutable text before\npersisting. A paraphrased or invented quote is rejected. This makes &quot;every generated part\ntraces to a source&quot; structurally true.\u003c/li>\n\u003cli>\u003cstrong>Hierarchical synthesis:\u003c/strong> a tree of arbitrary depth. Leaf nodes own quote-backed claims;\nparents synthesize their children. Inline \u003ccode>[^clm_…]\u003c/code> citations resolve to source-quote\nfootnotes in the rendered markdown.\u003c/li>\n\u003cli>\u003cstrong>The agent proposes, the CLI validates.\u003c/strong> Claim/entity/relationship/synthesis payloads\nare Zod-validated and persisted in a single transaction; the deterministic work (hashing,\nchunking, quote verification, staleness, render) lives in tested code, and only judgment\n(what a claim is, how to phrase synthesis, conflict adjudication) is left to the agent.\u003c/li>\n\u003c/ul>\n\u003ch2 id=\"overview-layout-of-a-knowledge-base\">Layout of a knowledge base \u003ca class=\"anchor\" href=\"#overview-layout-of-a-knowledge-base\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cfigure class=\"code\">\u003cfigcaption>\u003cspan class=\"lang\">text\u003c/span>\u003cbutton class=\"copy\" type=\"button\">Copy\u003c/button>\u003c/figcaption>\u003cpre>\u003ccode>&lt;kb-root&gt;/\n  kb.sqlite            # source of truth\n  sources/             # immutable, content-addressed source copies (read-only)\n  kb/                  # GENERATED markdown (read-only): index, changelog, open-questions,\n                       #   synthesis/ tree, graph/ entities+relationships\n  AGENTS.md / CLAUDE.md\u003c/code>\u003c/pre>\u003c/figure>\n\u003ch2 id=\"overview-quick-start\">Quick start \u003ca class=\"anchor\" href=\"#overview-quick-start\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cfigure class=\"code\">\u003cfigcaption>\u003cspan class=\"lang\">bash\u003c/span>\u003cbutton class=\"copy\" type=\"button\">Copy\u003c/button>\u003c/figcaption>\u003cpre>\u003ccode>pnpm install\n\u003cspan class=\"t-k\">export\u003c/span> KB_DIR=./my-kb\n\n./bin/kb init \u003cspan class=\"t-s\">\"$KB_DIR\"\u003c/span>\n./bin/kb ingest path/to/doc.md --\u003cspan class=\"t-k\">source\u003c/span>-date \u003cspan class=\"t-n\">2026\u003c/span>-\u003cspan class=\"t-n\">05\u003c/span>-\u003cspan class=\"t-n\">01\u003c/span> --json\n./bin/kb \u003cspan class=\"t-k\">source\u003c/span> chunks &lt;sourceId&gt; --json          \u003cspan class=\"t-c\"># read chunks to find exact quotes\u003c/span>\n./bin/kb node create --title \u003cspan class=\"t-s\">\"My Topic\"\u003c/span> --kind root --json\n./bin/kb claim apply --file claims.json --json    \u003cspan class=\"t-c\"># quote-verified claims\u003c/span>\n./bin/kb graph apply --file graph.json --json     \u003cspan class=\"t-c\"># entities + relationships\u003c/span>\n./bin/kb synthesize --file node.json --json       \u003cspan class=\"t-c\"># prose with [^clm_…] citations\u003c/span>\n./bin/kb verify --strict --json                   \u003cspan class=\"t-c\"># provenance + freshness invariants\u003c/span>\n./bin/kb render --json                            \u003cspan class=\"t-c\"># write kb/*.md\u003c/span>\n./bin/kb ask-context \u003cspan class=\"t-s\">\"a question\"\u003c/span> --json          \u003cspan class=\"t-c\"># retrieve claims+provenance to answer\u003c/span>\u003c/code>\u003c/pre>\u003c/figure>\n\u003cp>The agent normally drives these via the three skills in \u003ccode>.claude/skills/\u003c/code>:\n\u003cstrong>kb-create\u003c/strong> (build a KB from a corpus), \u003cstrong>kb-ingest\u003c/strong> (add one source), \u003cstrong>kb-query\u003c/strong>\n(answer a question with provenance).\u003c/p>\n\u003ch2 id=\"overview-cli-commands\">CLI commands \u003ca class=\"anchor\" href=\"#overview-cli-commands\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>\u003ccode>init\u003c/code>, \u003ccode>status\u003c/code>, \u003ccode>ingest\u003c/code>, \u003ccode>source show|chunks\u003c/code>, \u003ccode>node create|tree|show\u003c/code>, \u003ccode>claim apply\u003c/code>,\n\u003ccode>claim supersede\u003c/code>, \u003ccode>graph apply\u003c/code>, \u003ccode>synthesize\u003c/code>, \u003ccode>propagate\u003c/code>, \u003ccode>verify [--strict]\u003c/code>,\n\u003ccode>render [--check]\u003c/code>, \u003ccode>search\u003c/code>, \u003ccode>ask-context\u003c/code>, \u003ccode>answer-check\u003c/code>, \u003ccode>provenance\u003c/code>, \u003ccode>entity show\u003c/code>.\u003c/p>\n\u003cp>All accept \u003ccode>--json\u003c/code> (machine output: \u003ccode>{ ok, data, warnings, errors }\u003c/code>) and resolve the KB\nfrom \u003ccode>--kb &lt;dir&gt;\u003c/code>, \u003ccode>$KB_DIR\u003c/code>, or the nearest \u003ccode>kb.sqlite\u003c/code> above the cwd.\u003c/p>\n\u003ch2 id=\"overview-how-provenance-works-the-keystone\">How provenance works (the keystone) \u003ca class=\"anchor\" href=\"#overview-how-provenance-works-the-keystone\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003col>\n\u003cli>A source is stored verbatim and content-hashed; its \u003cstrong>canonical extracted text\u003c/strong> (BOM\nstripped, CRLF→LF, NFC) is what offsets address.\u003c/li>\n\u003cli>It is chunked deterministically (structure-aware, exact-tiling).\u003c/li>\n\u003cli>A \u003cstrong>claim\u003c/strong> cites a \u003ccode>chunk_id\u003c/code> + an exact \u003ccode>quote\u003c/code>. The CLI locates the quote in that\nchunk, derives absolute character offsets, and re-verifies it against the canonical text\n(\u003ccode>verifyQuote\u003c/code>). No normalization, no fuzzy matching — the agent must copy real text.\u003c/li>\n\u003cli>\u003ccode>kb verify --strict\u003c/code> re-checks every active claim has a supporting, still-matching quote,\nthat every inline citation resolves to a claim in scope, and that nothing is stale.\u003c/li>\n\u003c/ol>\n\u003ch2 id=\"overview-documentation\">Documentation \u003ca class=\"anchor\" href=\"#overview-documentation\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cul>\n\u003cli>\u003cstrong>\u003ca href=\"#user-guide\" data-doc=\"user-guide\">docs/USER_GUIDE.md\u003c/a>\u003c/strong> — concepts, the agent/skills flow, full CLI\nreference, JSON payload formats, workflows, troubleshooting.\u003c/li>\n\u003cli>\u003cstrong>\u003ca href=\"#architecture\" data-doc=\"architecture\">docs/ARCHITECTURE.md\u003c/a>\u003c/strong> — implementation &amp; design deep dive: layers,\nschema, the provenance keystone, algorithms, type safety, testing, trade-offs, V2.\u003c/li>\n\u003cli>\u003cstrong>\u003ca href=\"#design\" data-doc=\"design\">docs/DESIGN.md\u003c/a>\u003c/strong> — the original design record and post-review scope\ndecisions (the implementation contract).\u003c/li>\n\u003c/ul>\n\u003ch2 id=\"overview-design-development\">Design &amp; development \u003ca class=\"anchor\" href=\"#overview-design-development\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cul>\n\u003cli>Full design and the post-review scope decisions: \u003ca href=\"#design\" data-doc=\"design\">\u003ccode>docs/DESIGN.md\u003c/code>\u003c/a>.\u003c/li>\n\u003cli>Stack: TypeScript (strict), Zod at every agent boundary, \u003ccode>better-sqlite3\u003c/code>, Vitest.\u003c/li>\n\u003cli>Built test-first (red/green/refactor). Run:\u003cfigure class=\"code\">\u003cfigcaption>\u003cspan class=\"lang\">bash\u003c/span>\u003cbutton class=\"copy\" type=\"button\">Copy\u003c/button>\u003c/figcaption>\u003cpre>\u003ccode>pnpm test         \u003cspan class=\"t-c\"># vitest\u003c/span>\npnpm typecheck    \u003cspan class=\"t-c\"># tsc --noEmit (strict, noUncheckedIndexedAccess, exactOptionalPropertyTypes)\u003c/span>\u003c/code>\u003c/pre>\u003c/figure>\n\u003c/li>\n\u003c/ul>\n\u003ch2 id=\"overview-v1-scope\">V1 scope \u003ca class=\"anchor\" href=\"#overview-v1-scope\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>Ships: immutable sources, deterministic chunking + FTS, quote-verified claim extraction,\narbitrary-depth synthesis with boolean staleness, claim→span→source provenance, read-only\nmarkdown render with drift detection, conflict/supersession, a software-domain knowledge\ngraph, provenance-checked Q&amp;A, and the three skills. Deferred: PDF/binary extraction,\nbidirectional markdown editing, embeddings/vector search, fuzzy entity auto-merge, and\nsemantic (NLI) answer entailment.\u003c/p>\n","toc":[{"level":2,"text":"Core idea","id":"overview-core-idea"},{"level":2,"text":"Layout of a knowledge base","id":"overview-layout-of-a-knowledge-base"},{"level":2,"text":"Quick start","id":"overview-quick-start"},{"level":2,"text":"CLI commands","id":"overview-cli-commands"},{"level":2,"text":"How provenance works (the keystone)","id":"overview-how-provenance-works-the-keystone"},{"level":2,"text":"Documentation","id":"overview-documentation"},{"level":2,"text":"Design & development","id":"overview-design-development"},{"level":2,"text":"V1 scope","id":"overview-v1-scope"}]},{"id":"user-guide","title":"User Guide","html":"\u003ch1 id=\"user-guide-user-guide\">User Guide\u003c/h1>\n\u003cp>How to build, maintain, and query a knowledge base with \u003ccode>knowledge-base-ingest\u003c/code>. For how the\nsystem works internally, see \u003ca href=\"#architecture\" data-doc=\"architecture\">ARCHITECTURE.md\u003c/a>.\u003c/p>\n\u003chr>\n\u003ch2 id=\"user-guide-1-what-this-is\">1. What this is \u003ca class=\"anchor\" href=\"#user-guide-1-what-this-is\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>A tool for turning source documents (technical docs, design notes, transcripts, PRDs, READMEs)\ninto a \u003cstrong>queryable, provenance-tracked knowledge base\u003c/strong> that an AI agent (Claude Code) can keep\nup to date and answer questions from — with every answer traceable to an exact quote in an\nimmutable source.\u003c/p>\n\u003cp>Two audiences use it:\u003c/p>\n\u003cul>\n\u003cli>\u003cstrong>You (human):\u003c/strong> read the generated markdown in \u003ccode>kb/\u003c/code>, run the agent, ask questions.\u003c/li>\n\u003cli>\u003cstrong>The agent (Claude Code):\u003c/strong> drives the \u003ccode>kb\u003c/code> CLI via three skills to ingest sources, extract\nknowledge, and answer with citations.\u003c/li>\n\u003c/ul>\n\u003cp>You normally \u003cstrong>don&#39;t run the low-level commands by hand\u003c/strong> — you ask Claude Code to &quot;build a\nknowledge base from these docs&quot; or &quot;what does the KB say about X,&quot; and the skills do the rest.\nThis guide documents both the agent flow and the raw CLI.\u003c/p>\n\u003chr>\n\u003ch2 id=\"user-guide-2-core-concepts\">2. Core concepts \u003ca class=\"anchor\" href=\"#user-guide-2-core-concepts\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>Term\u003c/th>\n\u003cth>What it is\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>\u003cstrong>Source\u003c/strong>\u003c/td>\n\u003ctd>An original document, stored verbatim and immutably under \u003ccode>sources/\u003c/code>, content-addressed by hash. Never edited.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003cstrong>Canonical text\u003c/strong>\u003c/td>\n\u003ctd>The decoded, normalized text of a source (BOM stripped, CRLF→LF, NFC) that all quotes address.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003cstrong>Chunk\u003c/strong>\u003c/td>\n\u003ctd>A deterministic, heading-aware slice of a source. The unit you search and quote from.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003cstrong>Claim\u003c/strong>\u003c/td>\n\u003ctd>One atomic assertion (a normalized sentence) owned by a node, backed by ≥1 source quote. The knowledge atom.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003cstrong>Span\u003c/strong>\u003c/td>\n\u003ctd>An exact \u003ccode>[start,end)\u003c/code> quote from a source — the atomic unit of provenance.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003cstrong>Node\u003c/strong>\u003c/td>\n\u003ctd>A document in the synthesis tree (\u003ccode>root\u003c/code> / \u003ccode>topic\u003c/code> / \u003ccode>leaf\u003c/code>). Leaves own claims; parents synthesize children.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003cstrong>Entity / Relationship\u003c/strong>\u003c/td>\n\u003ctd>The knowledge graph: typed things (Service, Library, Concept…) and typed links (depends_on, stores_in…), each with provenance.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003cstrong>Synthesis\u003c/strong>\u003c/td>\n\u003ctd>A node&#39;s human-readable prose, with inline \u003ccode>[^clm_…]\u003c/code> citations that render to source-quote footnotes.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003cstrong>Stale\u003c/strong>\u003c/td>\n\u003ctd>A node whose inputs changed since it was last synthesized; it needs rewriting.\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>\u003cstrong>Mental model:\u003c/strong> \u003ccode>kb.sqlite\u003c/code> is the truth. The markdown under \u003ccode>kb/\u003c/code> is a \u003cem>printout\u003c/em> of it —\nread it, don&#39;t edit it (run \u003ccode>kb render\u003c/code> to regenerate). Knowledge changes only through \u003ccode>kb\u003c/code>\ncommands, which validate everything (especially that quotes are real) before saving.\u003c/p>\n\u003chr>\n\u003ch2 id=\"user-guide-3-install-setup\">3. Install &amp; setup \u003ca class=\"anchor\" href=\"#user-guide-3-install-setup\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cfigure class=\"code\">\u003cfigcaption>\u003cspan class=\"lang\">bash\u003c/span>\u003cbutton class=\"copy\" type=\"button\">Copy\u003c/button>\u003c/figcaption>\u003cpre>\u003ccode>pnpm install          \u003cspan class=\"t-c\"># builds the native better-sqlite3 module\u003c/span>\npnpm test             \u003cspan class=\"t-c\"># optional: 94 tests should pass\u003c/span>\u003c/code>\u003c/pre>\u003c/figure>\n\u003cp>The CLI runs without a build step via \u003ccode>./bin/kb\u003c/code> (it uses \u003ccode>tsx\u003c/code>). Point it at a knowledge base\nin one of three ways (checked in this order):\u003c/p>\n\u003col>\n\u003cli>\u003ccode>--kb &lt;dir&gt;\u003c/code> on any command\u003c/li>\n\u003cli>\u003ccode>export KB_DIR=&lt;dir&gt;\u003c/code>\u003c/li>\n\u003cli>the nearest \u003ccode>kb.sqlite\u003c/code> in or above the current directory\u003c/li>\n\u003c/ol>\n\u003cp>A knowledge base is just a directory:\u003c/p>\n\u003cfigure class=\"code\">\u003cfigcaption>\u003cspan class=\"lang\">text\u003c/span>\u003cbutton class=\"copy\" type=\"button\">Copy\u003c/button>\u003c/figcaption>\u003cpre>\u003ccode>&lt;kb-root&gt;/\n  kb.sqlite          # the source of truth\n  sources/           # immutable source copies (read-only)\n  kb/                # GENERATED markdown — your reading view (read-only)\n    index.md  changelog.md  open-questions.md\n    synthesis/…      # the hierarchy\n    graph/entities.md  graph/relationships.md\n  AGENTS.md  CLAUDE.md   # operating rules (autoloaded by Claude Code)\u003c/code>\u003c/pre>\u003c/figure>\n\u003chr>\n\u003ch2 id=\"user-guide-4-the-fast-path-let-the-agent-do-it\">4. The fast path: let the agent do it \u003ca class=\"anchor\" href=\"#user-guide-4-the-fast-path-let-the-agent-do-it\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>Ask Claude Code in natural language. The three skills in \u003ccode>.claude/skills/\u003c/code> trigger automatically:\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>You say…\u003c/th>\n\u003cth>Skill\u003c/th>\n\u003cth>What happens\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>&quot;Build a knowledge base from the docs in \u003ccode>./design-notes\u003c/code>&quot;\u003c/td>\n\u003ctd>\u003cstrong>kb-create\u003c/strong>\u003c/td>\n\u003ctd>inits a KB, designs a hierarchy, ingests every doc, synthesizes, verifies, renders\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>&quot;Ingest this new spec into the knowledge base&quot;\u003c/td>\n\u003ctd>\u003cstrong>kb-ingest\u003c/strong>\u003c/td>\n\u003ctd>adds one source, extracts quote-backed claims + graph, resolves conflicts, re-synthesizes\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>&quot;What does the KB say about token rotation?&quot;\u003c/td>\n\u003ctd>\u003cstrong>kb-query\u003c/strong>\u003c/td>\n\u003ctd>retrieves cited claims, drafts an answer, validates citations, answers with sources\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Everything below is what those skills do under the hood — useful for scripting, debugging, or\ndriving the system yourself.\u003c/p>\n\u003chr>\n\u003ch2 id=\"user-guide-5-quick-start-manual-walkthrough\">5. Quick start (manual walkthrough) \u003ca class=\"anchor\" href=\"#user-guide-5-quick-start-manual-walkthrough\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cfigure class=\"code\">\u003cfigcaption>\u003cspan class=\"lang\">bash\u003c/span>\u003cbutton class=\"copy\" type=\"button\">Copy\u003c/button>\u003c/figcaption>\u003cpre>\u003ccode>\u003cspan class=\"t-k\">export\u003c/span> KB_DIR=./my-kb\n\n\u003cspan class=\"t-c\"># 1. Create the knowledge base\u003c/span>\n./bin/kb init \u003cspan class=\"t-s\">\"$KB_DIR\"\u003c/span> --json\n\n\u003cspan class=\"t-c\"># 2. Ingest a source (registers an immutable copy + chunks it)\u003c/span>\n./bin/kb ingest ./docs/rate-limiter.md --\u003cspan class=\"t-k\">source\u003c/span>-date \u003cspan class=\"t-n\">2026\u003c/span>-\u003cspan class=\"t-n\">05\u003c/span>-\u003cspan class=\"t-n\">01\u003c/span> --json\n\u003cspan class=\"t-c\">#   → { \"data\": { \"sourceId\": \"src_…\", \"chunks\": 4, … } }\u003c/span>\n\n\u003cspan class=\"t-c\"># 3. Read the chunks to find exact quotes\u003c/span>\n./bin/kb \u003cspan class=\"t-k\">source\u003c/span> chunks src_… --json\n\n\u003cspan class=\"t-c\"># 4. Build the synthesis hierarchy\u003c/span>\n./bin/kb node create --title \u003cspan class=\"t-s\">\"Rate Limiter\"\u003c/span> --kind root --json     \u003cspan class=\"t-c\"># → nodeId nod_ROOT\u003c/span>\n./bin/kb node create --parent nod_ROOT --title \u003cspan class=\"t-s\">\"Storage\"\u003c/span> --kind leaf --json\n\n\u003cspan class=\"t-c\"># 5. Apply quote-verified claims (see §7 for the JSON shape)\u003c/span>\n./bin/kb claim apply --file claims.json --json\n\n\u003cspan class=\"t-c\"># 6. Add knowledge-graph entities + relationships\u003c/span>\n./bin/kb graph apply --file graph.json --json\n\n\u003cspan class=\"t-c\"># 7. Write the synthesis prose with inline [^clm_…] citations\u003c/span>\n./bin/kb synthesize --file node.json --json\n\n\u003cspan class=\"t-c\"># 8. Check invariants, then render the human view\u003c/span>\n./bin/kb verify --strict --json\n./bin/kb render --json\n\n\u003cspan class=\"t-c\"># 9. Ask a question\u003c/span>\n./bin/kb ask-context \u003cspan class=\"t-s\">\"how is bucket state stored?\"\u003c/span> --json\u003c/code>\u003c/pre>\u003c/figure>\n\u003chr>\n\u003ch2 id=\"user-guide-6-cli-reference\">6. CLI reference \u003ca class=\"anchor\" href=\"#user-guide-6-cli-reference\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>Every command accepts \u003ccode>--json\u003c/code> (machine output) and \u003ccode>--kb &lt;dir&gt;\u003c/code>. Output envelope:\n\u003ccode>{ ok, data, warnings, errors }\u003c/code>; exit code is \u003ccode>1\u003c/code> when \u003ccode>ok:false\u003c/code>. JSON payloads for the\n\u003ccode>apply\u003c/code>/\u003ccode>synthesize\u003c/code>/\u003ccode>answer-check\u003c/code> commands are read from \u003ccode>--file &lt;path&gt;\u003c/code> \u003cstrong>or\u003c/strong> stdin.\u003c/p>\n\u003ch3 id=\"user-guide-lifecycle-status\">Lifecycle &amp; status \u003ca class=\"anchor\" href=\"#user-guide-lifecycle-status\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>Command\u003c/th>\n\u003cth>Purpose\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>\u003ccode>kb init [&lt;dir&gt;]\u003c/code>\u003c/td>\n\u003ctd>Create a KB (DB, \u003ccode>sources/\u003c/code>, \u003ccode>kb/\u003c/code>, \u003ccode>AGENTS.md\u003c/code>/\u003ccode>CLAUDE.md\u003c/code>, initial render). Idempotent.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>kb status\u003c/code>\u003c/td>\n\u003ctd>Counts: sources, chunks, nodes, stale nodes, claims, spans, entities, relationships.\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3 id=\"user-guide-sources\">Sources \u003ca class=\"anchor\" href=\"#user-guide-sources\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>Command\u003c/th>\n\u003cth>Purpose\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>\u003ccode>kb ingest &lt;path&gt; [--title T] [--source-date D] [--supersedes &lt;src_id&gt;]\u003c/code>\u003c/td>\n\u003ctd>Register + chunk a source. Re-ingesting identical bytes is a no-op. \u003ccode>--supersedes\u003c/code> marks an older version superseded.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>kb source show &lt;source_id&gt;\u003c/code>\u003c/td>\n\u003ctd>Source metadata.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>kb source chunks &lt;source_id&gt;\u003c/code>\u003c/td>\n\u003ctd>All chunks with full text (this is how you find exact quotes).\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3 id=\"user-guide-synthesis-tree\">Synthesis tree \u003ca class=\"anchor\" href=\"#user-guide-synthesis-tree\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>Command\u003c/th>\n\u003cth>Purpose\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>\u003ccode>kb node create --title T --kind &lt;root|topic|leaf&gt; [--parent &lt;node_id&gt;] [--slug S]\u003c/code>\u003c/td>\n\u003ctd>Create a node. One \u003ccode>root\u003c/code>; others need \u003ccode>--parent\u003c/code>.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>kb node tree\u003c/code>\u003c/td>\n\u003ctd>The whole hierarchy with depth, kind, stale flag, claim counts.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>kb node show &lt;node_id&gt;\u003c/code>\u003c/td>\n\u003ctd>A node plus the claims it owns (with their ids — needed for citations).\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>kb synthesize --file &lt;json&gt;\u003c/code>\u003c/td>\n\u003ctd>Set a node&#39;s prose. Clears its stale flag. Rejects citations to unknown claims.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>kb propagate\u003c/code>\u003c/td>\n\u003ctd>Re-assert staleness propagation (every stale node marks its ancestors stale).\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3 id=\"user-guide-claims-graph\">Claims &amp; graph \u003ca class=\"anchor\" href=\"#user-guide-claims-graph\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>Command\u003c/th>\n\u003cth>Purpose\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>\u003ccode>kb claim apply --file &lt;json&gt;\u003c/code>\u003c/td>\n\u003ctd>Persist claims with quote-verified provenance (atomic).\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>kb claim supersede &lt;old_claim_id&gt; --by &lt;new_claim_id&gt;\u003c/code>\u003c/td>\n\u003ctd>Mark a claim superseded; marks affected nodes stale.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>kb graph apply --file &lt;json&gt;\u003c/code>\u003c/td>\n\u003ctd>Persist entities + relationships with provenance (atomic).\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3 id=\"user-guide-read-verify-render\">Read, verify, render \u003ca class=\"anchor\" href=\"#user-guide-read-verify-render\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>Command\u003c/th>\n\u003cth>Purpose\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>\u003ccode>kb search &lt;query&gt; [--scope chunks|claims|nodes|entities|all] [--limit N]\u003c/code>\u003c/td>\n\u003ctd>Full-text search.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>kb ask-context &quot;&lt;question&gt;&quot; [--limit N]\u003c/code>\u003c/td>\n\u003ctd>Retrieve relevant claims \u003cstrong>with provenance\u003c/strong>, plus related nodes/entities. The basis for answering.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>kb answer-check --file &lt;json&gt;\u003c/code>\u003c/td>\n\u003ctd>Validate a drafted answer&#39;s citations (structural).\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>kb provenance &lt;claim_id&gt;\u003c/code>\u003c/td>\n\u003ctd>Full provenance chain for a claim (quotes, offsets, source, stored path).\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>kb entity show &lt;entity_id&gt;\u003c/code>\u003c/td>\n\u003ctd>An entity and its relationships.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>kb verify [--strict]\u003c/code>\u003c/td>\n\u003ctd>Run provenance/structure invariants (see §11).\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>kb render [--check]\u003c/code>\u003c/td>\n\u003ctd>Write \u003ccode>kb/*.md\u003c/code>, or with \u003ccode>--check\u003c/code> detect drift without writing.\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003chr>\n\u003ch2 id=\"user-guide-7-json-payload-formats\">7. JSON payload formats \u003ca class=\"anchor\" href=\"#user-guide-7-json-payload-formats\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003ch3 id=\"user-guide-claim-apply\">\u003ccode>claim apply\u003c/code> \u003ca class=\"anchor\" href=\"#user-guide-claim-apply\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>The agent supplies a \u003ccode>chunk_id\u003c/code> and an \u003cstrong>exact\u003c/strong> \u003ccode>quote\u003c/code> (a verbatim substring of that\nchunk, unique within it). The CLI computes offsets and verifies the quote — paraphrases are\nrejected and the whole batch rolls back on any failure.\u003c/p>\n\u003cfigure class=\"code\">\u003cfigcaption>\u003cspan class=\"lang\">jsonc\u003c/span>\u003cbutton class=\"copy\" type=\"button\">Copy\u003c/button>\u003c/figcaption>\u003cpre>\u003ccode>{\n  \u003cspan class=\"t-s\">\"source_id\"\u003c/span>: \u003cspan class=\"t-s\">\"src_…\"\u003c/span>,\n  \u003cspan class=\"t-s\">\"claims\"\u003c/span>: [\n    {\n      \u003cspan class=\"t-s\">\"node_id\"\u003c/span>: \u003cspan class=\"t-s\">\"nod_…\"\u003c/span>,                       \u003cspan class=\"t-c\">// the leaf this claim belongs to\u003c/span>\n      \u003cspan class=\"t-s\">\"text\"\u003c/span>: \u003cspan class=\"t-s\">\"Bucket state is stored in Redis.\"\u003c/span>, \u003cspan class=\"t-c\">// your normalized assertion\u003c/span>\n      \u003cspan class=\"t-s\">\"claim_type\"\u003c/span>: \u003cspan class=\"t-s\">\"fact\"\u003c/span>,                      \u003cspan class=\"t-c\">// fact|definition|decision|requirement|\u003c/span>\n                                                 \u003cspan class=\"t-c\">//   constraint|procedure|warning|example|open_question\u003c/span>\n      \u003cspan class=\"t-s\">\"confidence\"\u003c/span>: \u003cspan class=\"t-n\">0.9\u003c/span>,\n      \u003cspan class=\"t-s\">\"spans\"\u003c/span>: [\n        { \u003cspan class=\"t-s\">\"chunk_id\"\u003c/span>: \u003cspan class=\"t-s\">\"chk_…\"\u003c/span>, \u003cspan class=\"t-s\">\"quote\"\u003c/span>: \u003cspan class=\"t-s\">\"Bucket state is stored in Redis.\"\u003c/span>, \u003cspan class=\"t-s\">\"role\"\u003c/span>: \u003cspan class=\"t-s\">\"supports\"\u003c/span> }\n      ]\n    }\n  ]\n}\u003c/code>\u003c/pre>\u003c/figure>\n\u003cp>\u003ccode>role\u003c/code> ∈ \u003ccode>supports|contradicts|context|supersedes\u003c/code> (default \u003ccode>supports\u003c/code>). A claim may cite\nmultiple spans (e.g. two phrases that together justify it).\u003c/p>\n\u003ch3 id=\"user-guide-graph-apply\">\u003ccode>graph apply\u003c/code> \u003ca class=\"anchor\" href=\"#user-guide-graph-apply\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cfigure class=\"code\">\u003cfigcaption>\u003cspan class=\"lang\">jsonc\u003c/span>\u003cbutton class=\"copy\" type=\"button\">Copy\u003c/button>\u003c/figcaption>\u003cpre>\u003ccode>{\n  \u003cspan class=\"t-s\">\"source_id\"\u003c/span>: \u003cspan class=\"t-s\">\"src_…\"\u003c/span>,\n  \u003cspan class=\"t-s\">\"entities\"\u003c/span>: [\n    { \u003cspan class=\"t-s\">\"type\"\u003c/span>: \u003cspan class=\"t-s\">\"Service\"\u003c/span>,   \u003cspan class=\"t-s\">\"name\"\u003c/span>: \u003cspan class=\"t-s\">\"Rate Limiter\"\u003c/span>, \u003cspan class=\"t-s\">\"description\"\u003c/span>: \u003cspan class=\"t-s\">\"…\"\u003c/span> },\n    { \u003cspan class=\"t-s\">\"type\"\u003c/span>: \u003cspan class=\"t-s\">\"DataStore\"\u003c/span>, \u003cspan class=\"t-s\">\"name\"\u003c/span>: \u003cspan class=\"t-s\">\"Redis\"\u003c/span>,        \u003cspan class=\"t-s\">\"description\"\u003c/span>: \u003cspan class=\"t-s\">\"…\"\u003c/span> }\n  ],\n  \u003cspan class=\"t-s\">\"relationships\"\u003c/span>: [\n    {\n      \u003cspan class=\"t-s\">\"type\"\u003c/span>: \u003cspan class=\"t-s\">\"stores_in\"\u003c/span>,\n      \u003cspan class=\"t-s\">\"subject\"\u003c/span>: { \u003cspan class=\"t-s\">\"type\"\u003c/span>: \u003cspan class=\"t-s\">\"Service\"\u003c/span>,   \u003cspan class=\"t-s\">\"name\"\u003c/span>: \u003cspan class=\"t-s\">\"Rate Limiter\"\u003c/span> },\n      \u003cspan class=\"t-s\">\"object\"\u003c/span>:  { \u003cspan class=\"t-s\">\"type\"\u003c/span>: \u003cspan class=\"t-s\">\"DataStore\"\u003c/span>, \u003cspan class=\"t-s\">\"name\"\u003c/span>: \u003cspan class=\"t-s\">\"Redis\"\u003c/span> },\n      \u003cspan class=\"t-s\">\"description\"\u003c/span>: \u003cspan class=\"t-s\">\"Bucket state lives in Redis\"\u003c/span>,\n      \u003cspan class=\"t-s\">\"confidence\"\u003c/span>: \u003cspan class=\"t-n\">0.95\u003c/span>,\n      \u003cspan class=\"t-s\">\"evidence\"\u003c/span>: [ { \u003cspan class=\"t-s\">\"chunk_id\"\u003c/span>: \u003cspan class=\"t-s\">\"chk_…\"\u003c/span>, \u003cspan class=\"t-s\">\"quote\"\u003c/span>: \u003cspan class=\"t-s\">\"Bucket state is stored in Redis.\"\u003c/span> } ]\n    }\n  ]\n}\u003c/code>\u003c/pre>\u003c/figure>\n\u003cp>Relationships require ≥1 evidence quote. Use the recommended vocabulary (entities: Service,\nComponent, Module, Library, Framework, API, DataStore, Config, Concept, Pattern, Decision,\nRequirement, Person, Version…; relationships: depends_on, calls, implements, exposes,\nstores_in, configured_by, supersedes, deprecates, part_of, references…). Don&#39;t strip version\nnumbers from names — \u003ccode>React 18\u003c/code> and \u003ccode>React\u003c/code> are different entities.\u003c/p>\n\u003ch3 id=\"user-guide-synthesize\">\u003ccode>synthesize\u003c/code> \u003ca class=\"anchor\" href=\"#user-guide-synthesize\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cfigure class=\"code\">\u003cfigcaption>\u003cspan class=\"lang\">jsonc\u003c/span>\u003cbutton class=\"copy\" type=\"button\">Copy\u003c/button>\u003c/figcaption>\u003cpre>\u003ccode>{\n  \u003cspan class=\"t-s\">\"node_id\"\u003c/span>: \u003cspan class=\"t-s\">\"nod_…\"\u003c/span>,\n  \u003cspan class=\"t-s\">\"title\"\u003c/span>: \u003cspan class=\"t-s\">\"Storage\"\u003c/span>,                       \u003cspan class=\"t-c\">// optional\u003c/span>\n  \u003cspan class=\"t-s\">\"summary\"\u003c/span>: \u003cspan class=\"t-s\">\"Redis holds bucket state.\"\u003c/span>,   \u003cspan class=\"t-c\">// optional (shown in parent subtopic lists)\u003c/span>\n  \u003cspan class=\"t-s\">\"body_md\"\u003c/span>: \u003cspan class=\"t-s\">\"Bucket state is stored in Redis.[^clm_37c84b…] A Lua script keeps the check-and-decrement atomic.[^clm_adc85f…]\"\u003c/span>\n}\u003c/code>\u003c/pre>\u003c/figure>\n\u003cp>Put an inline \u003ccode>[^clm_…]\u003c/code> citation after each assertion. Get claim ids from \u003ccode>kb node show &lt;node_id&gt;\u003c/code>. The renderer turns them into footnotes — \u003cstrong>never write footnote definitions\nyourself\u003c/strong>. A leaf must cite ≥1 claim; a parent may cite any claim in its subtree.\u003c/p>\n\u003ch3 id=\"user-guide-answer-check\">\u003ccode>answer-check\u003c/code> \u003ca class=\"anchor\" href=\"#user-guide-answer-check\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cfigure class=\"code\">\u003cfigcaption>\u003cspan class=\"lang\">jsonc\u003c/span>\u003cbutton class=\"copy\" type=\"button\">Copy\u003c/button>\u003c/figcaption>\u003cpre>\u003ccode>{ \u003cspan class=\"t-s\">\"answer\"\u003c/span>: \u003cspan class=\"t-s\">\"Bucket state is stored in Redis.[^clm_37c84b…] It is made atomic with Lua.[^clm_adc85f…]\"\u003c/span> }\u003c/code>\u003c/pre>\u003c/figure>\n\u003chr>\n\u003ch2 id=\"user-guide-8-common-workflows\">8. Common workflows \u003ca class=\"anchor\" href=\"#user-guide-8-common-workflows\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003ch3 id=\"user-guide-create-a-kb-from-a-corpus\">Create a KB from a corpus \u003ca class=\"anchor\" href=\"#user-guide-create-a-kb-from-a-corpus\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>Init → survey the docs → create a \u003ccode>root\u003c/code> and first-level \u003ccode>topic\u003c/code>/\u003ccode>leaf\u003c/code> nodes → ingest each\nsource (oldest first so newer ones can supersede) → apply claims and graph → synthesize\nbottom-up → \u003ccode>verify --strict\u003c/code> → \u003ccode>render\u003c/code>. (The \u003cstrong>kb-create\u003c/strong> skill automates this.)\u003c/p>\n\u003ch3 id=\"user-guide-ingest-a-new-source\">Ingest a new source \u003ca class=\"anchor\" href=\"#user-guide-ingest-a-new-source\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>\u003ccode>ingest\u003c/code> → \u003ccode>source chunks\u003c/code> → apply claims to the right nodes (creating nodes as needed) →\napply graph → resolve conflicts (§ below) → re-synthesize the nodes that went stale →\n\u003ccode>verify --strict\u003c/code> → \u003ccode>render\u003c/code>. (The \u003cstrong>kb-ingest\u003c/strong> skill automates this.)\u003c/p>\n\u003ch3 id=\"user-guide-update-a-document-handle-supersession\">Update a document / handle supersession \u003ca class=\"anchor\" href=\"#user-guide-update-a-document-handle-supersession\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cfigure class=\"code\">\u003cfigcaption>\u003cspan class=\"lang\">bash\u003c/span>\u003cbutton class=\"copy\" type=\"button\">Copy\u003c/button>\u003c/figcaption>\u003cpre>\u003ccode>kb ingest ./spec-v2.md --supersedes src_OLD --json   \u003cspan class=\"t-c\"># old source → superseded\u003c/span>\nkb \u003cspan class=\"t-k\">source\u003c/span> chunks src_NEW --json\nkb claim apply --file new-claims.json --json          \u003cspan class=\"t-c\"># new facts from v2\u003c/span>\nkb claim supersede clm_OLD --by clm_NEW --json        \u003cspan class=\"t-c\"># retire the contradicted claim\u003c/span>\nkb verify --json                                      \u003cspan class=\"t-c\"># shows the now-stale nodes\u003c/span>\n\u003cspan class=\"t-c\"># …re-synthesize stale nodes, then:\u003c/span>\nkb render --json\u003c/code>\u003c/pre>\u003c/figure>\n\u003ch3 id=\"user-guide-resolve-a-conflict\">Resolve a conflict \u003ca class=\"anchor\" href=\"#user-guide-resolve-a-conflict\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>If two sources disagree and neither clearly wins, keep both claims and present the conflict in\nthe node&#39;s prose (&quot;Sources disagree: …&quot; citing both). They surface in \u003ccode>kb/open-questions.md\u003c/code>.\nIf one supersedes the other, use \u003ccode>claim supersede\u003c/code>.\u003c/p>\n\u003ch3 id=\"user-guide-answer-a-question-with-provenance\">Answer a question with provenance \u003ca class=\"anchor\" href=\"#user-guide-answer-a-question-with-provenance\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cfigure class=\"code\">\u003cfigcaption>\u003cspan class=\"lang\">bash\u003c/span>\u003cbutton class=\"copy\" type=\"button\">Copy\u003c/button>\u003c/figcaption>\u003cpre>\u003ccode>kb ask-context \u003cspan class=\"t-s\">\"how is rate limiting enforced?\"\u003c/span> --json   \u003cspan class=\"t-c\"># → claims + quotes + node titles\u003c/span>\n\u003cspan class=\"t-c\"># draft an answer with [^clm_…] citations, then:\u003c/span>\nkb answer-check --file answer.json --json                \u003cspan class=\"t-c\"># ok:true required\u003c/span>\u003c/code>\u003c/pre>\u003c/figure>\n\u003ch3 id=\"user-guide-routine-maintenance\">Routine maintenance \u003ca class=\"anchor\" href=\"#user-guide-routine-maintenance\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>\u003ccode>kb verify --strict\u003c/code> (catch provenance/staleness issues) → re-synthesize anything stale →\n\u003ccode>kb render --check\u003c/code> (confirm the markdown matches the DB).\u003c/p>\n\u003chr>\n\u003ch2 id=\"user-guide-9-reading-the-output\">9. Reading the output \u003ca class=\"anchor\" href=\"#user-guide-9-reading-the-output\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>The \u003ccode>kb/\u003c/code> directory is your human-readable view (regenerate with \u003ccode>kb render\u003c/code>):\u003c/p>\n\u003cul>\n\u003cli>\u003cstrong>\u003ccode>index.md\u003c/code>\u003c/strong> — every source with title, date, status, and a link to its immutable copy;\nlinks into the synthesis tree and graph.\u003c/li>\n\u003cli>\u003cstrong>\u003ccode>synthesis/…\u003c/code>\u003c/strong> — the hierarchy. Each file is a node&#39;s prose; every claim shows as a\nfootnote with the exact source quote and the path to the source. Parents link their\nsubtopics.\u003c/li>\n\u003cli>\u003cstrong>\u003ccode>changelog.md\u003c/code>\u003c/strong> — what changed and when.\u003c/li>\n\u003cli>\u003cstrong>\u003ccode>open-questions.md\u003c/code>\u003c/strong> — unresolved conflicts and gaps.\u003c/li>\n\u003cli>\u003cstrong>\u003ccode>graph/entities.md\u003c/code>, \u003ccode>graph/relationships.md\u003c/code>\u003c/strong> — the knowledge graph.\u003c/li>\n\u003c/ul>\n\u003cp>A footnote looks like:\u003c/p>\n\u003cfigure class=\"code\">\u003cfigcaption>\u003cspan class=\"lang\">text\u003c/span>\u003cbutton class=\"copy\" type=\"button\">Copy\u003c/button>\u003c/figcaption>\u003cpre>\u003ccode>[^clm_37c84b…]: Bucket state is stored in Redis. — “Bucket state is stored in Redis.” (Rate Limiter Service, sources/9a/9af0bfed8bd3b5a2.md)\u003c/code>\u003c/pre>\u003c/figure>\n\u003cp>That is the whole point: from any synthesized sentence you can reach the verbatim source text\nthat justifies it.\u003c/p>\n\u003chr>\n\u003ch2 id=\"user-guide-10-trusting-an-answer\">10. Trusting an answer \u003ca class=\"anchor\" href=\"#user-guide-10-trusting-an-answer\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>An answer is trustworthy when \u003ccode>kb answer-check\u003c/code> returns \u003ccode>ok:true\u003c/code> \u003cstrong>and\u003c/strong> the cited quotes (in\nthe \u003ccode>ask-context\u003c/code> provenance or \u003ccode>kb provenance &lt;claim_id&gt;\u003c/code>) actually say what the sentence\nclaims. \u003ccode>answer-check\u003c/code> guarantees the \u003cem>structure\u003c/em> — every assertion cites an active,\nsource-backed claim — but it cannot judge meaning, so read the quotes for anything important.\nIf \u003ccode>ask-context\u003c/code> returns nothing relevant, the KB doesn&#39;t cover the question; a good agent says\nso rather than guessing.\u003c/p>\n\u003chr>\n\u003ch2 id=\"user-guide-11-the-verify-checks\">11. The \u003ccode>verify\u003c/code> checks \u003ca class=\"anchor\" href=\"#user-guide-11-the-verify-checks\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>\u003ccode>kb verify\u003c/code> (add \u003ccode>--strict\u003c/code> to fail on warnings):\u003c/p>\n\u003cul>\n\u003cli>\u003cstrong>errors\u003c/strong> (provenance/structure broken): \u003ccode>claim-has-provenance\u003c/code>, \u003ccode>quote-matches-source\u003c/code>,\n\u003ccode>citation-resolves\u003c/code>, \u003ccode>parent-cites-subtree\u003c/code>, \u003ccode>citation-active\u003c/code>, \u003ccode>fts-integrity\u003c/code>.\u003c/li>\n\u003cli>\u003cstrong>warnings\u003c/strong> (maintenance): \u003ccode>leaf-has-citation\u003c/code>, \u003ccode>no-stale-nodes\u003c/code>.\u003c/li>\n\u003c/ul>\n\u003cp>A green \u003ccode>verify --strict\u003c/code> means: every active claim is backed by a quote that still matches its\nsource, every synthesized citation resolves to an in-scope active claim, and nothing is stale.\u003c/p>\n\u003chr>\n\u003ch2 id=\"user-guide-12-troubleshooting\">12. Troubleshooting \u003ca class=\"anchor\" href=\"#user-guide-12-troubleshooting\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>Symptom\u003c/th>\n\u003cth>Cause / fix\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>\u003ccode>quote not found in chunk …\u003c/code>\u003c/td>\n\u003ctd>Your \u003ccode>quote\u003c/code> isn&#39;t a verbatim substring of that chunk. Re-read \u003ccode>kb source chunks\u003c/code> and copy exact text (watch capitalization, punctuation, and line wraps — the canonical text uses \u003ccode>\\n\u003c/code>).\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>quote is ambiguous … appears more than once\u003c/code>\u003c/td>\n\u003ctd>The quote occurs twice in the chunk. Provide a longer, unique quote.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>claim apply\u003c/code> failed, nothing saved\u003c/td>\n\u003ctd>Batches are atomic — one bad quote rolls back all. Fix the offending span and retry the whole payload.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>body cites unknown claim(s): clm_…\u003c/code>\u003c/td>\n\u003ctd>A \u003ccode>[^clm_…]\u003c/code> in \u003ccode>body_md\u003c/code> doesn&#39;t match a real claim id. Get ids from \u003ccode>kb node show &lt;node_id&gt;\u003c/code>.\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>verify\u003c/code> warns \u003ccode>no-stale-nodes\u003c/code>\u003c/td>\n\u003ctd>Nodes need re-synthesis after an ingest/supersede. Re-run \u003ccode>kb synthesize\u003c/code> on each, deepest first (\u003ccode>node tree\u003c/code> shows the tree; stale nodes are flagged).\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>render --check\u003c/code> reports \u003ccode>drifted\u003c/code>\u003c/td>\n\u003ctd>Someone edited generated markdown, or content changed. Re-run \u003ccode>kb render\u003c/code> (the DB is the truth; edits to \u003ccode>kb/*.md\u003c/code> are discarded).\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>V1 ingests UTF-8 text sources …\u003c/code>\u003c/td>\n\u003ctd>The file is binary/PDF. Extract its text first and ingest that (\u003ccode>.md\u003c/code>/\u003ccode>.txt\u003c/code>).\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>No knowledge base at … (missing kb.sqlite)\u003c/code>\u003c/td>\n\u003ctd>Wrong \u003ccode>--kb\u003c/code>/\u003ccode>KB_DIR\u003c/code>, or you haven&#39;t run \u003ccode>kb init\u003c/code>.\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003chr>\n\u003ch2 id=\"user-guide-13-limitations-v1-scope\">13. Limitations (V1 scope) \u003ca class=\"anchor\" href=\"#user-guide-13-limitations-v1-scope\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cul>\n\u003cli>\u003cstrong>Text sources only\u003c/strong> (UTF-8 markdown/plain text/code). PDFs/HTML must be converted to text\nfirst.\u003c/li>\n\u003cli>\u003cstrong>Generated markdown is read-only\u003c/strong> — edit knowledge through the CLI, not by hand. (Human\ncorrections enter as claims; full bidirectional editing is deferred.)\u003c/li>\n\u003cli>\u003cstrong>Exact-match entity resolution\u003c/strong> — no fuzzy auto-merge; surface-form variants that don&#39;t\nnormalize identically become distinct entities.\u003c/li>\n\u003cli>\u003cstrong>Structural answer-check\u003c/strong> — confirms citations resolve to active claims, not that a claim\nsemantically entails the sentence (read the quotes).\u003c/li>\n\u003cli>\u003cstrong>No node move/split/merge command yet\u003c/strong> — restructure by creating new nodes and\nre-applying claims.\u003c/li>\n\u003cli>Single-user, local. No web UI, no multi-user, no embeddings/vector search.\u003c/li>\n\u003c/ul>\n\u003cp>See \u003ca href=\"#architecture\" data-doc=\"architecture\">ARCHITECTURE.md §16\u003c/a> for the V2 extension points.\u003c/p>\n\u003chr>\n\u003ch2 id=\"user-guide-14-faq\">14. FAQ \u003ca class=\"anchor\" href=\"#user-guide-14-faq\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>\u003cstrong>Can I just edit the markdown in \u003ccode>kb/\u003c/code>?\u003c/strong> No — it&#39;s a render of the database and will be\noverwritten. Change knowledge with \u003ccode>kb\u003c/code> commands; \u003ccode>render\u003c/code> regenerates the markdown.\u003c/p>\n\u003cp>\u003cstrong>What stops the agent from making things up?\u003c/strong> Every claim must quote the source exactly; the\nCLI verifies the quote against the immutable text before saving and re-checks it in \u003ccode>verify\u003c/code>. A\nfabricated or paraphrased quote is rejected.\u003c/p>\n\u003cp>\u003cstrong>How do I see where a fact came from?\u003c/strong> \u003ccode>kb provenance &lt;claim_id&gt;\u003c/code> (or read the footnote in\nthe rendered node) shows the exact quote, offsets, source title, and stored file path.\u003c/p>\n\u003cp>\u003cstrong>Can I delete the database and rebuild it?\u003c/strong> The sources under \u003ccode>sources/\u003c/code> are the only\nirreplaceable data; they&#39;re immutable copies. The synthesis and graph live in \u003ccode>kb.sqlite\u003c/code>. (V1\nhas no automatic rebuild-from-sources; back up \u003ccode>kb.sqlite\u003c/code>.)\u003c/p>\n\u003cp>\u003cstrong>How do I run it through Claude Code instead of by hand?\u003c/strong> Just ask — &quot;ingest this into the\nknowledge base,&quot; &quot;what does the KB say about X.&quot; The \u003cstrong>kb-ingest\u003c/strong>, \u003cstrong>kb-create\u003c/strong>, and\n\u003cstrong>kb-query\u003c/strong> skills drive the CLI for you.\u003c/p>\n","toc":[{"level":2,"text":"1. What this is","id":"user-guide-1-what-this-is"},{"level":2,"text":"2. Core concepts","id":"user-guide-2-core-concepts"},{"level":2,"text":"3. Install & setup","id":"user-guide-3-install-setup"},{"level":2,"text":"4. The fast path: let the agent do it","id":"user-guide-4-the-fast-path-let-the-agent-do-it"},{"level":2,"text":"5. Quick start (manual walkthrough)","id":"user-guide-5-quick-start-manual-walkthrough"},{"level":2,"text":"6. CLI reference","id":"user-guide-6-cli-reference"},{"level":3,"text":"Lifecycle & status","id":"user-guide-lifecycle-status"},{"level":3,"text":"Sources","id":"user-guide-sources"},{"level":3,"text":"Synthesis tree","id":"user-guide-synthesis-tree"},{"level":3,"text":"Claims & graph","id":"user-guide-claims-graph"},{"level":3,"text":"Read, verify, render","id":"user-guide-read-verify-render"},{"level":2,"text":"7. JSON payload formats","id":"user-guide-7-json-payload-formats"},{"level":3,"text":"claim apply","id":"user-guide-claim-apply"},{"level":3,"text":"graph apply","id":"user-guide-graph-apply"},{"level":3,"text":"synthesize","id":"user-guide-synthesize"},{"level":3,"text":"answer-check","id":"user-guide-answer-check"},{"level":2,"text":"8. Common workflows","id":"user-guide-8-common-workflows"},{"level":3,"text":"Create a KB from a corpus","id":"user-guide-create-a-kb-from-a-corpus"},{"level":3,"text":"Ingest a new source","id":"user-guide-ingest-a-new-source"},{"level":3,"text":"Update a document / handle supersession","id":"user-guide-update-a-document-handle-supersession"},{"level":3,"text":"Resolve a conflict","id":"user-guide-resolve-a-conflict"},{"level":3,"text":"Answer a question with provenance","id":"user-guide-answer-a-question-with-provenance"},{"level":3,"text":"Routine maintenance","id":"user-guide-routine-maintenance"},{"level":2,"text":"9. Reading the output","id":"user-guide-9-reading-the-output"},{"level":2,"text":"10. Trusting an answer","id":"user-guide-10-trusting-an-answer"},{"level":2,"text":"11. The verify checks","id":"user-guide-11-the-verify-checks"},{"level":2,"text":"12. Troubleshooting","id":"user-guide-12-troubleshooting"},{"level":2,"text":"13. Limitations (V1 scope)","id":"user-guide-13-limitations-v1-scope"},{"level":2,"text":"14. FAQ","id":"user-guide-14-faq"}]},{"id":"architecture","title":"Architecture","html":"\u003ch1 id=\"architecture-architecture-implementation-guide\">Architecture &amp; Implementation Guide\u003c/h1>\n\u003cp>A deep walkthrough of how \u003ccode>knowledge-base-ingest\u003c/code> is built and why. For how to \u003cem>use\u003c/em> it,\nsee \u003ca href=\"#user-guide\" data-doc=\"user-guide\">USER_GUIDE.md\u003c/a>. For the original design record and the contested\ndecisions, see \u003ca href=\"#design\" data-doc=\"design\">DESIGN.md\u003c/a>.\u003c/p>\n\u003chr>\n\u003ch2 id=\"architecture-1-thesis\">1. Thesis \u003ca class=\"anchor\" href=\"#architecture-1-thesis\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>A knowledge base is only trustworthy if \u003cstrong>every generated statement can be traced to a\nsource, and that link cannot silently rot or be faked\u003c/strong>. This system makes that an\n\u003cem>enforced invariant\u003c/em> rather than a convention by choosing:\u003c/p>\n\u003cul>\n\u003cli>\u003cstrong>SQLite as the single source of truth\u003c/strong> for all derived/generated state (synthesis\nprose, claims, provenance edges, the knowledge graph). Foreign keys and a quote-verified\nprovenance chain make &quot;untraceable knowledge&quot; structurally impossible to persist.\u003c/li>\n\u003cli>\u003cstrong>Markdown as a deterministic, read-only projection\u003c/strong> of the database — the human view,\nregenerated on demand, never the authority.\u003c/li>\n\u003cli>\u003cstrong>Immutable, content-addressed source copies\u003c/strong> segregated from everything derived.\u003c/li>\n\u003cli>\u003cstrong>A hard boundary\u003c/strong>: the AI agent only \u003cem>proposes\u003c/em> Zod-validated JSON; the CLI \u003cem>validates\nand persists\u003c/em> inside a single transaction. All judgment (what a claim is, how to phrase\nsynthesis) lives in the agent; all determinism (hashing, chunking, quote verification,\nstaleness, render) lives in tested code.\u003c/li>\n\u003c/ul>\n\u003cp>Everything below follows from those four choices.\u003c/p>\n\u003chr>\n\u003ch2 id=\"architecture-2-system-layers\">2. System layers \u003ca class=\"anchor\" href=\"#architecture-2-system-layers\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>Dependencies flow strictly downward. Nothing in a lower layer imports from a higher one.\u003c/p>\n\u003cfigure class=\"code\">\u003cfigcaption>\u003cspan class=\"lang\">text\u003c/span>\u003cbutton class=\"copy\" type=\"button\">Copy\u003c/button>\u003c/figcaption>\u003cpre>\u003ccode>┌──────────────────────────────────────────────────────────────┐\n│ cli/            argument parsing, command dispatch, envelope   │  src/cli/\n├──────────────────────────────────────────────────────────────┤\n│ kb/             workspace (open/init), scaffold (AGENTS.md)    │  src/kb/\n├──────────────────────────────────────────────────────────────┤\n│ render/  verify/  query/   feature modules over repositories   │  src/render, src/verify, src/query\n├──────────────────────────────────────────────────────────────┤\n│ domain/services/    Ingest · Claim · Graph · Node · spanResolver│ src/domain/services/\n├──────────────────────────────────────────────────────────────┤\n│ domain/algorithms/  PURE: hash, idDeriver, normalize, chunker, │  src/domain/algorithms/\n│                     quoteVerifier, citations                   │\n│ db/repositories/    typed data access (one class per aggregate)│  src/db/repositories/\n├──────────────────────────────────────────────────────────────┤\n│ db/   connection, migrations, rows (Zod row→model parsers)     │  src/db/\n│ domain/schemas/  enums, ids (branded), models, agent payloads  │  src/domain/schemas, src/domain/ids\n│ ingest/sourceStore   immutable file storage (injected)         │  src/ingest/\n└──────────────────────────────────────────────────────────────┘\u003c/code>\u003c/pre>\u003c/figure>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>Layer\u003c/th>\n\u003cth>Responsibility\u003c/th>\n\u003cth>Key property\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>\u003ccode>domain/algorithms\u003c/code>\u003c/td>\n\u003ctd>Pure functions, zero I/O\u003c/td>\n\u003ctd>Deterministic; ~full unit coverage\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>db\u003c/code>\u003c/td>\n\u003ctd>Schema, connection, typed repositories\u003c/td>\n\u003ctd>Every read re-validated by Zod\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>domain/services\u003c/code>\u003c/td>\n\u003ctd>Transactional business logic\u003c/td>\n\u003ctd>All judgment-free; atomic\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>render\u003c/code>/\u003ccode>verify\u003c/code>/\u003ccode>query\u003c/code>\u003c/td>\n\u003ctd>Read-mostly features\u003c/td>\n\u003ctd>Pure-ish, testable in isolation\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>cli\u003c/code>\u003c/td>\n\u003ctd>Thin dispatch + \u003ccode>{ok,data,warnings,errors}\u003c/code> envelope\u003c/td>\n\u003ctd>No business logic\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>The seams that keep LLM judgment out of the deterministic core:\u003c/p>\n\u003cul>\n\u003cli>Agent JSON enters at exactly one point per command — a \u003ccode>*Schema.parse()\u003c/code> in \u003ccode>cli/index.ts\u003c/code>.\nIf Zod throws, the command fails before any DB write.\u003c/li>\n\u003cli>Quote verification (\u003ccode>spanResolver.ts\u003c/code> → \u003ccode>quoteVerifier.ts\u003c/code>) runs after Zod, before any\nspan is persisted.\u003c/li>\n\u003cli>FTS sync is in SQL triggers, so no code path can write a chunk/claim/node without updating\nits search index.\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch2 id=\"architecture-3-data-model-sqlite-schema\">3. Data model (SQLite schema) \u003ca class=\"anchor\" href=\"#architecture-3-data-model-sqlite-schema\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>Defined in \u003ca href=\"../src/db/migrations.ts\">\u003ccode>src/db/migrations.ts\u003c/code>\u003c/a>. All domain tables are \u003ccode>STRICT\u003c/code>\n(typed storage), use \u003ccode>PRAGMA foreign_keys=ON\u003c/code>, WAL, and stable text ids with a type prefix\n(\u003ccode>src_\u003c/code>, \u003ccode>chk_\u003c/code>, \u003ccode>spn_\u003c/code>, \u003ccode>nod_\u003c/code>, \u003ccode>clm_\u003c/code>, \u003ccode>ent_\u003c/code>, \u003ccode>rel_\u003c/code>).\u003c/p>\n\u003ch3 id=\"architecture-the-provenance-chain-the-spine\">The provenance chain (the spine) \u003ca class=\"anchor\" href=\"#architecture-the-provenance-chain-the-spine\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cfigure class=\"code\">\u003cfigcaption>\u003cspan class=\"lang\">text\u003c/span>\u003cbutton class=\"copy\" type=\"button\">Copy\u003c/button>\u003c/figcaption>\u003cpre>\u003ccode>synthesis node.body_md  ──[^clm_…] inline citation──►  claims\n                                                          │\n                                          claim_spans (role=supports)\n                                                          ▼\n                                                        spans  ──►  source_chunks\n                                                          │              │\n                                              (char_start, char_end, quote, quote_hash)\n                                                          ▼              ▼\n                                                    source_texts (canonical) ◄── sources (immutable bytes)\u003c/code>\u003c/pre>\u003c/figure>\n\u003cp>Reading bottom-up: an immutable \u003cstrong>source\u003c/strong> has a canonical \u003cstrong>source_text\u003c/strong>; it is split into\n\u003cstrong>source_chunks\u003c/strong>; a \u003cstrong>span\u003c/strong> is an exact \u003ccode>[char_start, char_end)\u003c/code> slice of the canonical\ntext (carrying the verified \u003ccode>quote\u003c/code>); a \u003cstrong>claim\u003c/strong> is justified by one or more spans via\n\u003cstrong>claim_spans\u003c/strong>; a \u003cstrong>node\u003c/strong>&#39;s prose cites claims inline, which the renderer turns into\nfootnotes. The knowledge graph hangs off the same spans via \u003cstrong>relationship_spans\u003c/strong>.\u003c/p>\n\u003ch3 id=\"architecture-tables\">Tables \u003ca class=\"anchor\" href=\"#architecture-tables\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>Table\u003c/th>\n\u003cth>Purpose\u003c/th>\n\u003cth>Natural key / notes\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>\u003ccode>meta\u003c/code>\u003c/td>\n\u003ctd>\u003ccode>schema_version\u003c/code>, bookkeeping\u003c/td>\n\u003ctd>\u003ccode>k\u003c/code> PK\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>sources\u003c/code>\u003c/td>\n\u003ctd>immutable registry: hash, stored path, title, status, \u003ccode>supersedes_source_id\u003c/code>\u003c/td>\n\u003ctd>\u003ccode>sha256\u003c/code> UNIQUE\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>source_texts\u003c/code>\u003c/td>\n\u003ctd>\u003cstrong>canonical extracted text\u003c/strong> + extractor name/version\u003c/td>\n\u003ctd>offsets address \u003cem>this\u003c/em> text\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>source_chunks\u003c/code>\u003c/td>\n\u003ctd>deterministic structure-aware chunks + char offsets\u003c/td>\n\u003ctd>\u003ccode>(source_id, chunk_index)\u003c/code> UNIQUE\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>spans\u003c/code>\u003c/td>\n\u003ctd>atomic provenance target: \u003ccode>(char_start,char_end,quote,quote_hash)\u003c/code>\u003c/td>\n\u003ctd>\u003ccode>(source_id, char_start, char_end)\u003c/code> UNIQUE\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>nodes\u003c/code>\u003c/td>\n\u003ctd>synthesis tree: \u003ccode>parent_id\u003c/code>, \u003ccode>slug\u003c/code>, \u003ccode>kind\u003c/code>, \u003ccode>depth\u003c/code>, \u003ccode>body_md\u003c/code>, \u003ccode>is_stale\u003c/code>\u003c/td>\n\u003ctd>\u003ccode>(parent_id, slug)\u003c/code> UNIQUE\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>claims\u003c/code>\u003c/td>\n\u003ctd>knowledge atoms: \u003ccode>text\u003c/code>, \u003ccode>normalized_text\u003c/code>, \u003ccode>claim_type\u003c/code>, \u003ccode>status\u003c/code>, \u003ccode>superseded_by_claim_id\u003c/code>\u003c/td>\n\u003ctd>\u003ccode>(node_id, normalized_text)\u003c/code> UNIQUE\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>claim_spans\u003c/code>\u003c/td>\n\u003ctd>claim→span provenance edges, \u003ccode>role\u003c/code>, \u003ccode>extractor\u003c/code>\u003c/td>\n\u003ctd>\u003ccode>(claim_id, span_id, role)\u003c/code> PK\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>entities\u003c/code>\u003c/td>\n\u003ctd>KG nodes: \u003ccode>type\u003c/code>, \u003ccode>canonical_name\u003c/code>, \u003ccode>normalized_name\u003c/code>\u003c/td>\n\u003ctd>\u003ccode>(type, normalized_name)\u003c/code> UNIQUE\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>relationships\u003c/code>\u003c/td>\n\u003ctd>KG edges: \u003ccode>type\u003c/code>, subject/object entity ids, \u003ccode>status\u003c/code>\u003c/td>\n\u003ctd>\u003ccode>(type, subject, object)\u003c/code> UNIQUE\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>relationship_spans\u003c/code>\u003c/td>\n\u003ctd>relationship→span provenance\u003c/td>\n\u003ctd>\u003ccode>(relationship_id, span_id, role)\u003c/code> PK\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>changelog\u003c/code>\u003c/td>\n\u003ctd>append-only mutation log\u003c/td>\n\u003ctd>for \u003ccode>changelog.md\u003c/code> + audit\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>rendered_files\u003c/code>\u003c/td>\n\u003ctd>per-file content hash for drift detection\u003c/td>\n\u003ctd>\u003ccode>path\u003c/code> PK\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>chunks_fts\u003c/code> / \u003ccode>claims_fts\u003c/code> / \u003ccode>nodes_fts\u003c/code>\u003c/td>\n\u003ctd>FTS5 external-content indexes\u003c/td>\n\u003ctd>kept in sync by triggers\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3 id=\"architecture-why-source-texts-is-separate-from-sources\">Why \u003ccode>source_texts\u003c/code> is separate from \u003ccode>sources\u003c/code> \u003ca class=\"anchor\" href=\"#architecture-why-source-texts-is-separate-from-sources\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>The raw bytes are immutable and content-hashed, but a \u003cem>quote\u003c/em> must be addressed against a\nstable, decoded string. \u003ccode>source_texts\u003c/code> stores the \u003cstrong>canonical extracted text\u003c/strong> produced by a\nnamed, versioned extractor (\u003ccode>text-utf8/1\u003c/code>: strip BOM, CRLF→LF, Unicode NFC). All character\noffsets and quotes are defined against this string, in \u003cstrong>JS UTF-16 code units\u003c/strong> (the units\n\u003ccode>String.prototype.slice\u003c/code> uses), so multi-byte characters line up and the provenance chain is\nstable forever. (This was a fix surfaced by an independent design review — addressing raw\nbytes would have broken on encoding/line-ending differences.)\u003c/p>\n\u003ch3 id=\"architecture-fts-sync-via-triggers\">FTS sync via triggers \u003ca class=\"anchor\" href=\"#architecture-fts-sync-via-triggers\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>Each FTS table is external-content over its base table and kept consistent by three triggers\n(\u003ccode>_ai\u003c/code> insert, \u003ccode>_ad\u003c/code> delete, \u003ccode>_au\u003c/code> update-as-delete+insert). Putting sync in SQL means no\napplication path can desync the index, and the update trigger prevents the classic &quot;old text\nstill searchable after an edit&quot; bug. \u003ccode>verify\u003c/code> additionally runs each index&#39;s built-in\n\u003ccode>integrity-check\u003c/code>.\u003c/p>\n\u003chr>\n\u003ch2 id=\"architecture-4-the-deterministic-core-domain-algorithms\">4. The deterministic core (\u003ccode>domain/algorithms\u003c/code>) \u003ca class=\"anchor\" href=\"#architecture-4-the-deterministic-core-domain-algorithms\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>Pure functions, no I/O, no clock, no randomness — hammered by unit tests because everything\ndownstream trusts them.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>Module\u003c/th>\n\u003cth>Guarantees\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>\u003ccode>hash.ts\u003c/code>\u003c/td>\n\u003ctd>\u003ccode>sha256Hex\u003c/code> — byte-exact, no hidden normalization\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>normalize.ts\u003c/code>\u003c/td>\n\u003ctd>\u003ccode>normalizeSourceText\u003c/code> (canonical text); \u003ccode>normalizeClaimText\u003c/code> / \u003ccode>normalizeEntityName\u003c/code> (identity keys — lossy on purpose, never used to address source); \u003ccode>slugify\u003c/code>\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>idDeriver.ts\u003c/code>\u003c/td>\n\u003ctd>Content-addressed ids: same inputs → same id (the basis of idempotency)\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>chunker.ts\u003c/code>\u003c/td>\n\u003ctd>Structure-aware, \u003cstrong>exact-tiling\u003c/strong> chunking (chunks concatenate back to the input, no gaps/overlap), respects fenced code blocks, size-splits oversized sections\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>quoteVerifier.ts\u003c/code>\u003c/td>\n\u003ctd>\u003ccode>verifyQuote\u003c/code> — exact substring at exact offsets, no normalization, no fuzzy match\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>citations.ts\u003c/code>\u003c/td>\n\u003ctd>Extract \u003ccode>[^clm_…]\u003c/code> references from prose\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003ch3 id=\"architecture-identity-idempotency\">Identity &amp; idempotency \u003ca class=\"anchor\" href=\"#architecture-identity-idempotency\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>Ids are \u003ccode>&lt;prefix&gt; + first 16 hex of a SHA-256\u003c/code> of a stable tuple:\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>Entity\u003c/th>\n\u003cth>Derived from\u003c/th>\n\u003cth>Consequence\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>source\u003c/td>\n\u003ctd>raw bytes\u003c/td>\n\u003ctd>re-ingesting identical bytes is a no-op\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>chunk\u003c/td>\n\u003ctd>\u003ccode>(source_id, chunk_index)\u003c/code>\u003c/td>\n\u003ctd>stable across re-runs\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>span\u003c/td>\n\u003ctd>\u003ccode>(source_id, char_start, char_end)\u003c/code>\u003c/td>\n\u003ctd>same quote range → same span (provenance dedupes)\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>claim\u003c/td>\n\u003ctd>\u003ccode>(normalized_text, first_seen_source_id)\u003c/code>\u003c/td>\n\u003ctd>node-independent, so a claim keeps its id when it moves between nodes\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>entity\u003c/td>\n\u003ctd>\u003ccode>(type, normalized_name)\u003c/code>\u003c/td>\n\u003ctd>exact-match resolution; \u003cstrong>versions are not stripped\u003c/strong> (\u003ccode>React 18\u003c/code> ≠ \u003ccode>React\u003c/code>)\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>relationship\u003c/td>\n\u003ctd>\u003ccode>(type, subject_id, object_id)\u003c/code>\u003c/td>\n\u003ctd>\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>node\u003c/td>\n\u003ctd>\u003ccode>(parent_id, slug)\u003c/code>\u003c/td>\n\u003ctd>re-creating the same node is idempotent\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>The derived id is a \u003cem>stable handle\u003c/em>; the real dedup guard is the \u003ccode>UNIQUE\u003c/code> natural key in the\nDB. Services look up by natural key, then upsert — and report \u003ccode>{created, updated}\u003c/code> counts.\u003c/p>\n\u003cblockquote>\n\u003cp>\u003cstrong>Subtlety (review-fixed):\u003c/strong> claims dedupe by \u003ccode>(node_id, normalized_text)\u003c/code>, not by the\nderived id. The same assertion reaching the same node from a \u003cem>second\u003c/em> source attaches new\nprovenance to the existing claim rather than colliding — and a re-extraction never resets a\nsuperseded claim back to active (status is preserved on upsert). Covered by\n\u003ccode>regression.test.ts\u003c/code>.\u003c/p>\n\u003c/blockquote>\n\u003chr>\n\u003ch2 id=\"architecture-5-provenance-the-keystone-in-depth\">5. Provenance — the keystone in depth \u003ca class=\"anchor\" href=\"#architecture-5-provenance-the-keystone-in-depth\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>The single load-bearing mechanism. Its purpose is \u003cstrong>anti-hallucination\u003c/strong>, not anti-rot.\u003c/p>\n\u003cp>\u003cstrong>Write path\u003c/strong> (\u003ccode>ClaimService.apply\u003c/code>, \u003ccode>GraphService.apply\u003c/code> → \u003ccode>spanResolver.resolveSpan\u003c/code>):\u003c/p>\n\u003col>\n\u003cli>The agent supplies a \u003ccode>chunk_id\u003c/code> + an exact \u003ccode>quote\u003c/code> (it never computes offsets).\u003c/li>\n\u003cli>The CLI locates the quote inside that chunk&#39;s text (\u003ccode>chunk.text.indexOf(quote)\u003c/code>); a\nnot-found or \u003cstrong>non-unique\u003c/strong> quote is rejected (a citation must point at exactly one place).\u003c/li>\n\u003cli>It derives absolute offsets \u003ccode>chunk.charStart + idx\u003c/code> and re-verifies them against the\ncanonical \u003ccode>source_texts.text\u003c/code> with \u003ccode>verifyQuote\u003c/code> — exact match, no normalization.\u003c/li>\n\u003cli>Only then is the span persisted (\u003ccode>quote_hash = sha256(quote)\u003c/code>), deduped by range, and\nlinked via \u003ccode>claim_spans\u003c/code> / \u003ccode>relationship_spans\u003c/code>.\u003c/li>\n\u003c/ol>\n\u003cp>If any quote in a batch fails, the \u003cstrong>whole transaction rolls back\u003c/strong> — nothing is persisted.\u003c/p>\n\u003cp>\u003cstrong>Audit path\u003c/strong> (\u003ccode>verify\u003c/code>): re-runs the substring check for \u003cstrong>every\u003c/strong> span in the table (not\njust claim-reachable ones, so a tampered graph-only span is caught too) and confirms each\n\u003ccode>quote_hash\u003c/code> matches. A claim citing a superseded/retracted claim, or a claim with no\nsupporting span, is an error.\u003c/p>\n\u003cp>This is why &quot;every generated part traces to a source&quot; is a \u003ccode>JOIN\u003c/code>, not a hope: a span cannot\nexist without an exact, re-verifiable quote, and a synthesis sentence&#39;s citation must resolve\nto such a claim.\u003c/p>\n\u003chr>\n\u003ch2 id=\"architecture-6-hierarchical-synthesis-staleness\">6. Hierarchical synthesis &amp; staleness \u003ca class=\"anchor\" href=\"#architecture-6-hierarchical-synthesis-staleness\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>The synthesis tree (\u003ccode>nodes\u003c/code>) has arbitrary depth: one \u003ccode>root\u003c/code>, then \u003ccode>topic\u003c/code>/\u003ccode>leaf\u003c/code> nodes.\n\u003cstrong>Leaf nodes own claims\u003c/strong> (\u003ccode>claims.node_id\u003c/code>); a parent synthesizes its children and may cite\nany claim in its subtree (provenance stays monotonic up the tree). Each node stores its prose\nin \u003ccode>body_md\u003c/code> with inline \u003ccode>[^clm_…]\u003c/code> citations; the renderer generates the footnote\ndefinitions (the agent never writes them).\u003c/p>\n\u003cp>\u003cstrong>Staleness is a boolean\u003c/strong> (\u003ccode>nodes.is_stale\u003c/code>), not a set of revision counters. When a node&#39;s\nclaims change — or a child is added — the node \u003cem>and all its ancestors\u003c/em> are marked stale in one\nrecursive-CTE \u003ccode>UPDATE\u003c/code> (\u003ccode>markStaleWithAncestors\u003c/code>). Re-synthesis proceeds bottom-up:\n\u003ccode>listStaleDeepestFirst()\u003c/code> orders by \u003ccode>depth DESC\u003c/code>. Writing a node&#39;s body via \u003ccode>synthesize\u003c/code>\nclears its flag.\u003c/p>\n\u003cblockquote>\n\u003cp>This boolean model replaced a counter-based design during review: counters could mask\nstaleness (an old high child-rev hiding a new low one) and mishandle moves/splits. A\nboolean + ancestor-walk is simpler \u003cem>and\u003c/em> correct for those cases. See\n\u003ca href=\"#design\" data-doc=\"design\">DESIGN.md §9\u003c/a>.\u003c/p>\n\u003c/blockquote>\n\u003chr>\n\u003ch2 id=\"architecture-7-knowledge-graph\">7. Knowledge graph \u003ca class=\"anchor\" href=\"#architecture-7-knowledge-graph\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>\u003ccode>entities\u003c/code> (typed, with \u003ccode>normalized_name\u003c/code>) and \u003ccode>relationships\u003c/code> (typed, subject→object), each\ncarrying provenance via \u003ccode>relationship_spans\u003c/code>. \u003ccode>type\u003c/code> is free \u003cstrong>TEXT\u003c/strong> validated against a\n\u003cem>recommended\u003c/em> vocabulary the skills document (Service, DataStore, Library, Concept, Pattern,\nDecision, …; relationships: depends_on, stores_in, implements, supersedes, configured_by, …) —\nextensible without schema changes. Resolution is exact \u003ccode>(type, normalized_name)\u003c/code>; normalization\nlowercases and collapses whitespace but deliberately \u003cstrong>does not\u003c/strong> strip versions or\npunctuation, because for software entities those are identity. No fuzzy auto-merge in V1.\u003c/p>\n\u003chr>\n\u003ch2 id=\"architecture-8-the-ingestion-pipeline\">8. The ingestion pipeline \u003ca class=\"anchor\" href=\"#architecture-8-the-ingestion-pipeline\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>The division of labor between deterministic CLI work and agent judgment:\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>Step\u003c/th>\n\u003cth>Owner\u003c/th>\n\u003cth>Module\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>Register source (hash, dedup, store immutable copy, canonical text)\u003c/td>\n\u003ctd>CLI\u003c/td>\n\u003ctd>\u003ccode>IngestService\u003c/code>\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>Structure-aware chunk + FTS\u003c/td>\n\u003ctd>CLI\u003c/td>\n\u003ctd>\u003ccode>chunker\u003c/code>, triggers\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>Read chunks (the context bundle)\u003c/td>\n\u003ctd>CLI\u003c/td>\n\u003ctd>\u003ccode>source chunks\u003c/code>\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>Decide claims, types, exact quotes\u003c/td>\n\u003ctd>\u003cstrong>agent\u003c/strong>\u003c/td>\n\u003ctd>(skill)\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>Verify quotes, persist claims + spans (atomic)\u003c/td>\n\u003ctd>CLI\u003c/td>\n\u003ctd>\u003ccode>ClaimService\u003c/code>\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>Decide entities/relationships + evidence\u003c/td>\n\u003ctd>\u003cstrong>agent\u003c/strong>\u003c/td>\n\u003ctd>(skill)\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>Resolve + persist graph (atomic)\u003c/td>\n\u003ctd>CLI\u003c/td>\n\u003ctd>\u003ccode>GraphService\u003c/code>\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>Adjudicate conflicts/supersession\u003c/td>\n\u003ctd>\u003cstrong>agent\u003c/strong>\u003c/td>\n\u003ctd>(skill) + \u003ccode>claim supersede\u003c/code>\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>Build/choose synthesis nodes\u003c/td>\n\u003ctd>\u003cstrong>agent\u003c/strong>\u003c/td>\n\u003ctd>\u003ccode>node create\u003c/code>\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>Mark stale (automatic on claim apply / node create)\u003c/td>\n\u003ctd>CLI\u003c/td>\n\u003ctd>recursive CTE\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>Re-synthesize stale nodes bottom-up\u003c/td>\n\u003ctd>\u003cstrong>agent\u003c/strong>\u003c/td>\n\u003ctd>\u003ccode>synthesize\u003c/code>\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>Verify + render\u003c/td>\n\u003ctd>CLI\u003c/td>\n\u003ctd>\u003ccode>verify\u003c/code>, \u003ccode>render\u003c/code>\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Every mutating command runs in one \u003ccode>BEGIN IMMEDIATE\u003c/code> transaction (\u003ccode>Repositories.tx\u003c/code>) and\nappends to \u003ccode>changelog\u003c/code>.\u003c/p>\n\u003ch3 id=\"architecture-conflict-supersession\">Conflict &amp; supersession \u003ca class=\"anchor\" href=\"#architecture-conflict-supersession\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cul>\n\u003cli>\u003cstrong>Source level:\u003c/strong> \u003ccode>ingest --supersedes &lt;old&gt;\u003c/code> marks the old source \u003ccode>superseded\u003c/code>.\u003c/li>\n\u003cli>\u003cstrong>Claim level:\u003c/strong> the agent adds the new claim, then \u003ccode>claim supersede &lt;old&gt; --by &lt;new&gt;\u003c/code> sets\nthe old claim \u003ccode>superseded\u003c/code> (with \u003ccode>superseded_by_claim_id\u003c/code>) and marks affected nodes stale.\u003c/li>\n\u003cli>\u003cstrong>Unresolved disagreement:\u003c/strong> both claims stay, status \u003ccode>conflicted\u003c/code>; they surface in\n\u003ccode>kb/open-questions.md

\u003c/code>. (Setting \u003ccode>conflicted\u003c/code> is a manual/agent step in V1.)\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch2 id=\"architecture-9-rendering-db-markdown\">9. Rendering (DB → markdown) \u003ca class=\"anchor\" href=\"#architecture-9-rendering-db-markdown\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>\u003ca href=\"../src/render/render.ts\">\u003ccode>src/render/render.ts\u003c/code>\u003c/a>. \u003ccode>renderAll(repos)\u003c/code> is a \u003cstrong>pure,\ndeterministic\u003c/strong> function — same DB state → byte-identical output (no wall-clock in file\nbodies; all ordering comes from stable \u003ccode>ORDER BY\u003c/code>). It produces, under \u003ccode>kb/\u003c/code>:\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>synthesis/…\u003c/code> — one file per node mirroring the tree (parents → \u003ccode>…/index.md\u003c/code>, leaves →\n\u003ccode>….md\u003c/code>), each with the node&#39;s prose, a \u003ccode>## Subtopics\u003c/code> list (parents), and a \u003ccode>## Sources\u003c/code>\nfootnote section resolving every \u003ccode>[^clm_…]\u003c/code> to its claim text + exact source quote + stored\npath.\u003c/li>\n\u003cli>\u003ccode>index.md\u003c/code> (sources + links), \u003ccode>changelog.md\u003c/code>, \u003ccode>open-questions.md\u003c/code>, \u003ccode>graph/entities.md\u003c/code>,\n\u003ccode>graph/relationships.md\u003c/code>.\u003c/li>\n\u003c/ul>\n\u003cp>\u003ccode>writeRender\u003c/code> writes the files and records each \u003ccode>content_hash\u003c/code> in \u003ccode>rendered_files\u003c/code>.\n\u003ccode>checkRender\u003c/code> (via \u003ccode>render --check\u003c/code>) recomputes and reports \u003ccode>ok | missing | drifted\u003c/code> — the\nread-only contract is enforced by detection, not file permissions.\u003c/p>\n\u003chr>\n\u003ch2 id=\"architecture-10-search-provenance-checked-q-a\">10. Search &amp; provenance-checked Q&amp;A \u003ca class=\"anchor\" href=\"#architecture-10-search-provenance-checked-q-a\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>\u003ca href=\"../src/query/query.ts\">\u003ccode>src/query/query.ts\u003c/code>\u003c/a>:\u003c/p>\n\u003cul>\n\u003cli>\u003ccode>search(query, {scope, limit})\u003c/code> — FTS over chunks/claims/nodes (token-quoted to survive\npunctuation; \u003cstrong>AND\u003c/strong> semantics for precision) plus entity \u003ccode>LIKE\u003c/code>. Degrades to empty per\nscope on FTS error rather than throwing.\u003c/li>\n\u003cli>\u003ccode>askContext(question, {limit})\u003c/code> — the primary Q&amp;A retrieval. \u003cstrong>OR\u003c/strong> semantics (a natural\nquestion AND-joined would match nothing) returns relevant \u003ccode>active\u003c/code>/\u003ccode>conflicted\u003c/code> claims, each\nenriched with owning-node title and full provenance (source title + exact quote). Plus\nrelated nodes and entities.\u003c/li>\n\u003cli>\u003ccode>answerCheck(answer)\u003c/code> — a \u003cstrong>structural\u003c/strong> gate: every \u003ccode>[^clm_…]\u003c/code> in the answer must resolve\nto an \u003ccode>active\u003c/code> claim; assertive sentences must carry a citation (the splitter keeps a\ncitation attached to the sentence it follows, even when it sits right after the period).\nReturns \u003ccode>{ok, unknownCitations, inactiveCitations, uncitedSentences}\u003c/code>. It does \u003cstrong>not\u003c/strong> check\nsemantic entailment — that needs an NLI/LLM pass and is deferred (documented in-module).\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch2 id=\"architecture-11-the-verify-invariants\">11. The \u003ccode>verify\u003c/code> invariants \u003ca class=\"anchor\" href=\"#architecture-11-the-verify-invariants\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>\u003ca href=\"../src/verify/verify.ts\">\u003ccode>src/verify/verify.ts\u003c/code>\u003c/a> — read-only, each finding has a stable\n\u003ccode>check\u003c/code> name. \u003ccode>--strict\u003c/code> turns warnings into failures.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>Check\u003c/th>\n\u003cth>Severity\u003c/th>\n\u003cth>What it guarantees\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>\u003ccode>claim-has-provenance\u003c/code>\u003c/td>\n\u003ctd>error\u003c/td>\n\u003ctd>every active claim has ≥1 supporting span\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>quote-matches-source\u003c/code>\u003c/td>\n\u003ctd>error\u003c/td>\n\u003ctd>\u003cstrong>every\u003c/strong> span (incl. relationship-only) still quotes its source exactly; \u003ccode>quote_hash\u003c/code> intact\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>citation-resolves\u003c/code>\u003c/td>\n\u003ctd>error\u003c/td>\n\u003ctd>every inline \u003ccode>[^clm_…]\u003c/code> resolves to a claim\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>parent-cites-subtree\u003c/code>\u003c/td>\n\u003ctd>error\u003c/td>\n\u003ctd>a node only cites claims in its subtree\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>citation-active\u003c/code>\u003c/td>\n\u003ctd>error\u003c/td>\n\u003ctd>prose does not cite a superseded/retracted claim\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>leaf-has-citation\u003c/code>\u003c/td>\n\u003ctd>warning\u003c/td>\n\u003ctd>a leaf with a body cites ≥1 claim\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>no-stale-nodes\u003c/code>\u003c/td>\n\u003ctd>warning\u003c/td>\n\u003ctd>nothing needs re-synthesis\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>fts-integrity\u003c/code>\u003c/td>\n\u003ctd>error\u003c/td>\n\u003ctd>each FTS index passes its internal integrity-check\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003chr>\n\u003ch2 id=\"architecture-12-type-safety-design\">12. Type-safety design \u003ca class=\"anchor\" href=\"#architecture-12-type-safety-design\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cul>\n\u003cli>\u003cstrong>Branded ids\u003c/strong> (\u003ca href=\"../src/domain/ids.ts\">\u003ccode>src/domain/ids.ts\u003c/code>\u003c/a>): phantom-typed strings so a\n\u003ccode>ChunkId\u003c/code> can&#39;t be passed where a \u003ccode>SourceId\u003c/code> is expected. Constructed only via \u003ccode>make*\u003c/code>\n(prefix-validating) or \u003ccode>idDeriver\u003c/code>.\u003c/li>\n\u003cli>\u003cstrong>Single Zod boundary\u003c/strong>: agent payloads (\u003ca href=\"../src/domain/schemas/agent.ts\">\u003ccode>schemas/agent.ts\u003c/code>\u003c/a>)\nparsed at the CLI edge; raw DB rows parsed into camelCase domain models in\n\u003ca href=\"../src/db/rows.ts\">\u003ccode>db/rows.ts\u003c/code>\u003c/a> on every read. Nothing past the repository layer sees a\nraw row; nothing past the CLI edge sees unparsed agent input.\u003c/li>\n\u003cli>\u003ccode>tsconfig\u003c/code> is strict with \u003ccode>noUncheckedIndexedAccess\u003c/code> and \u003ccode>exactOptionalPropertyTypes\u003c/code>. No\n\u003ccode>any\u003c/code> in the codebase.\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch2 id=\"architecture-13-transactions-concurrency-errors\">13. Transactions, concurrency, errors \u003ca class=\"anchor\" href=\"#architecture-13-transactions-concurrency-errors\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cul>\n\u003cli>Multi-table mutations run in one \u003ccode>db.transaction(fn).immediate()\u003c/code> — a write lock is taken up\nfront, and a thrown error (Zod failure, quote mismatch, FK violation) rolls everything back.\u003c/li>\n\u003cli>The output envelope is uniform: \u003ccode>{ ok, data, warnings, errors }\u003c/code>. Exit code is 1 when\n\u003ccode>ok:false\u003c/code>. Zod errors are flattened to readable \u003ccode>path: message\u003c/code> strings.\u003c/li>\n\u003cli>The source store resolves and asserts every read path stays under \u003ccode>&lt;root&gt;/sources\u003c/code>, and\nsanitizes extensions — defense in depth even though paths are derived from content hashes.\u003c/li>\n\u003c/ul>\n\u003chr>\n\u003ch2 id=\"architecture-14-testing-strategy\">14. Testing strategy \u003ca class=\"anchor\" href=\"#architecture-14-testing-strategy\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>Built test-first (red/green/refactor). 94 tests across 14 files; \u003ccode>pnpm test\u003c/code>, \u003ccode>pnpm typecheck\u003c/code>.\u003c/p>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>Layer\u003c/th>\n\u003cth>How it&#39;s tested\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>\u003ccode>domain/algorithms\u003c/code>\u003c/td>\n\u003ctd>Pure unit tests, edge cases (CRLF, BOM, emoji offsets, code-fence headings, exact tiling)\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>db\u003c/code>\u003c/td>\n\u003ctd>In-memory SQLite: migrations idempotent, FK + CHECK + STRICT enforced, FTS update triggers\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>domain/services\u003c/code>\u003c/td>\n\u003ctd>Integration against in-memory DB + \u003ccode>MemorySourceStore\u003c/code> + injected clock: quote verification, \u003cstrong>atomicity rollback\u003c/strong>, idempotency, staleness\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>render\u003c/code>/\u003ccode>verify\u003c/code>/\u003ccode>query\u003c/code>\u003c/td>\n\u003ctd>Seeded in-memory KB: determinism, drift, tamper detection, retrieval, answer-check\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>cli\u003c/code>\u003c/td>\n\u003ctd>Subprocess test of the real \u003ccode>kb\u003c/code> binary: envelope, exit codes, the provenance gate\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>regression\u003c/code>\u003c/td>\n\u003ctd>The bugs an independent (Codex) implementation review found\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>Test doubles are injected (\u003ccode>Db\u003c/code>, \u003ccode>SourceStore\u003c/code>, \u003ccode>now\u003c/code>), never \u003ccode>jest.mock\u003c/code> on internal modules.\u003c/p>\n\u003chr>\n\u003ch2 id=\"architecture-15-key-design-decisions-trade-offs\">15. Key design decisions &amp; trade-offs \u003ca class=\"anchor\" href=\"#architecture-15-key-design-decisions-trade-offs\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>Decision\u003c/th>\n\u003cth>Why\u003c/th>\n\u003cth>Cost accepted\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>SQLite-as-truth, markdown read-only\u003c/td>\n\u003ctd>provenance is enforceable only in a relational graph\u003c/td>\n\u003ctd>humans read but don&#39;t hand-edit synthesis\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>Quote-verified spans (kept despite a &quot;cut it&quot; review)\u003c/td>\n\u003ctd>the anti-hallucination keystone\u003c/td>\n\u003ctd>agent must copy exact text\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>Boolean staleness, not counters\u003c/td>\n\u003ctd>simpler \u003cem>and\u003c/em> fixes move/split miscount bugs\u003c/td>\n\u003ctd>none material for single-user\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>Claim-level (not sentence-level) prose decomposition\u003c/td>\n\u003ctd>ships V1; readable agent-written prose\u003c/td>\n\u003ctd>sentence-granular provenance deferred\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>Free-TEXT graph types + vocabulary\u003c/td>\n\u003ctd>extensible without migrations\u003c/td>\n\u003ctd>no enforced ontology\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>\u003ccode>answer-check\u003c/code> is structural only\u003c/td>\n\u003ctd>deterministic and shippable\u003c/td>\n\u003ctd>semantic entailment deferred\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>Render to read-only md, drift by hash\u003c/td>\n\u003ctd>zero &quot;DB says X, doc shows Y&quot;\u003c/td>\n\u003ctd>re-render after content changes\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003chr>\n\u003ch2 id=\"architecture-16-extension-points-v2\">16. Extension points (V2) \u003ca class=\"anchor\" href=\"#architecture-16-extension-points-v2\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cul>\n\u003cli>\u003cstrong>Source extractors:\u003c/strong> \u003ccode>source_texts\u003c/code> already records \u003ccode>extractor\u003c/code>/\u003ccode>extractor_version\u003c/code>; add a\nPDF/HTML extractor that produces canonical text + offset anchors.\u003c/li>\n\u003cli>\u003cstrong>Entity resolution:\u003c/strong> add \u003ccode>entity_aliases\u003c/code> + fuzzy candidates + an audited \u003ccode>entity merge\u003c/code>\n(FK repoint).\u003c/li>\n\u003cli>\u003cstrong>Sentence-level provenance:\u003c/strong> promote \u003ccode>body_md\u003c/code> to block/sentence records mapping each\nsentence to claims (the schema already isolates claims as the atom).\u003c/li>\n\u003cli>\u003cstrong>Semantic answer-check:\u003c/strong> add an NLI/LLM pass on top of the structural gate.\u003c/li>\n\u003cli>\u003cstrong>Embeddings:\u003c/strong> add a vector index alongside FTS for semantic retrieval in \u003ccode>query\u003c/code>.\u003c/li>\n\u003cli>\u003cstrong>Node restructuring:\u003c/strong> \u003ccode>node move\u003c/code>/\u003ccode>split\u003c/code>/\u003ccode>merge\u003c/code> as claim-reparenting operations (claims\ncarry node-independent ids precisely to make this lossless).\u003c/li>\n\u003c/ul>\n\u003cp>The guiding principle to preserve through any extension: \u003cstrong>make unsupported knowledge\nimpossible to persist through normal commands.\u003c/strong>\u003c/p>\n","toc":[{"level":2,"text":"1. Thesis","id":"architecture-1-thesis"},{"level":2,"text":"2. System layers","id":"architecture-2-system-layers"},{"level":2,"text":"3. Data model (SQLite schema)","id":"architecture-3-data-model-sqlite-schema"},{"level":3,"text":"The provenance chain (the spine)","id":"architecture-the-provenance-chain-the-spine"},{"level":3,"text":"Tables","id":"architecture-tables"},{"level":3,"text":"Why source_texts is separate from sources","id":"architecture-why-source-texts-is-separate-from-sources"},{"level":3,"text":"FTS sync via triggers","id":"architecture-fts-sync-via-triggers"},{"level":2,"text":"4. The deterministic core (domain/algorithms)","id":"architecture-4-the-deterministic-core-domain-algorithms"},{"level":3,"text":"Identity & idempotency","id":"architecture-identity-idempotency"},{"level":2,"text":"5. Provenance — the keystone in depth","id":"architecture-5-provenance-the-keystone-in-depth"},{"level":2,"text":"6. Hierarchical synthesis & staleness","id":"architecture-6-hierarchical-synthesis-staleness"},{"level":2,"text":"7. Knowledge graph","id":"architecture-7-knowledge-graph"},{"level":2,"text":"8. The ingestion pipeline","id":"architecture-8-the-ingestion-pipeline"},{"level":3,"text":"Conflict & supersession","id":"architecture-conflict-supersession"},{"level":2,"text":"9. Rendering (DB → markdown)","id":"architecture-9-rendering-db-markdown"},{"level":2,"text":"10. Search & provenance-checked Q&A","id":"architecture-10-search-provenance-checked-q-a"},{"level":2,"text":"11. The verify invariants","id":"architecture-11-the-verify-invariants"},{"level":2,"text":"12. Type-safety design","id":"architecture-12-type-safety-design"},{"level":2,"text":"13. Transactions, concurrency, errors","id":"architecture-13-transactions-concurrency-errors"},{"level":2,"text":"14. Testing strategy","id":"architecture-14-testing-strategy"},{"level":2,"text":"15. Key design decisions & trade-offs","id":"architecture-15-key-design-decisions-trade-offs"},{"level":2,"text":"16. Extension points (V2)","id":"architecture-16-extension-points-v2"}]},{"id":"design","title":"Design Record","html":"\u003ch1 id=\"design-knowledge-base-ingest-design-v1\">Knowledge Base Ingest — Design (V1)\u003c/h1>\n\u003cp>Synthesized from three independent design passes (two internal architects + Codex/gpt-5.5).\nTwo of three converged on \u003cstrong>SQLite-as-truth\u003c/strong>; this design adopts it and grafts the best\nideas from all three.\u003c/p>\n\u003ch2 id=\"design-0-core-decision-sqlite-is-the-source-of-truth-markdown-is-a-rendered-projection\">0. Core decision: SQLite is the source of truth; markdown is a rendered projection \u003ca class=\"anchor\" href=\"#design-0-core-decision-sqlite-is-the-source-of-truth-markdown-is-a-rendered-projection\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cul>\n\u003cli>\u003cstrong>SQLite\u003c/strong> holds all derived/generated state: source registry, chunks, source spans,\nsynthesis-node tree, synthesis prose, claims, provenance edges, entities, relationships,\nstaleness, render bookkeeping.\u003c/li>\n\u003cli>\u003cstrong>Immutable source copies\u003c/strong> live on disk under \u003ccode>sources/\u003c/code>, content-addressed, never edited.\u003c/li>\n\u003cli>\u003cstrong>Human-readable markdown\u003c/strong> is a deterministic, one-way render of the DB under \u003ccode>kb/\u003c/code>.\nGenerated markdown carries a render header + content hash; it is \u003cstrong>read-only\u003c/strong>. \u003ccode>kb render --check\u003c/code> detects drift; \u003ccode>kb render\u003c/code> overwrites. V1 does not import markdown edits back.\u003c/li>\n\u003c/ul>\n\u003cp>Why: the requirement is to \u003cem>strictly\u003c/em> maintain provenance so every generated part traces to a\nsource. That is an \u003cstrong>enforced invariant\u003c/strong> when truth is a relational graph with foreign keys and\nquote-verified spans; it is only advisory when truth is hand-editable prose. The cost\n(humans read but don&#39;t hand-edit synthesis) is acceptable for a local single-user V1, and human\nknowledge still enters through typed CLI mutations.\u003c/p>\n\u003ch2 id=\"design-1-on-disk-layout\">1. On-disk layout \u003ca class=\"anchor\" href=\"#design-1-on-disk-layout\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cfigure class=\"code\">\u003cfigcaption>\u003cspan class=\"lang\">text\u003c/span>\u003cbutton class=\"copy\" type=\"button\">Copy\u003c/button>\u003c/figcaption>\u003cpre>\u003ccode>&lt;kb-root&gt;/                          e.g. ./kb/&lt;slug&gt;/\n  kb.sqlite                         # source of truth (WAL)\n  sources/                          # IMMUTABLE, content-addressed, chmod 0444\n    &lt;ab&gt;/&lt;sha256&gt;.&lt;ext&gt;             # verbatim bytes\n    &lt;ab&gt;/&lt;sha256&gt;.meta.json         # registry mirror (informational)\n  kb/                               # GENERATED markdown projection (read-only)\n    index.md                        # all sources + descriptions (req #3)\n    changelog.md                    # mutation history\n    open-questions.md               # conflicts / gaps / unresolved\n    graph/entities.md\n    graph/relationships.md\n    synthesis/\n      root.md                       # top-level synthesis (req #2)\n      &lt;topic-slug&gt;/\n        index.md                    # parent = synthesis of children\n        &lt;leaf-slug&gt;.md\n  AGENTS.md / CLAUDE.md             # how agents must operate in this KB\u003c/code>\u003c/pre>\u003c/figure>\n\u003cp>The deterministic CLI \u003cstrong>owns\u003c/strong> \u003ccode>kb.sqlite\u003c/code> + \u003ccode>sources/\u003c/code> + \u003ccode>kb/\u003c/code>. The agent never writes those\nfiles directly; it calls the CLI.\u003c/p>\n\u003ch2 id=\"design-2-sqlite-schema-authoritative\">2. SQLite schema (authoritative) \u003ca class=\"anchor\" href=\"#design-2-sqlite-schema-authoritative\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>Conventions: \u003ccode>STRICT\u003c/code> tables, \u003ccode>PRAGMA foreign_keys=ON\u003c/code>, WAL. Stable text IDs with type prefixes\n(\u003ccode>src_\u003c/code>, \u003ccode>chk_\u003c/code>, \u003ccode>spn_\u003c/code>, \u003ccode>nod_\u003c/code>, \u003ccode>clm_\u003c/code>, \u003ccode>ent_\u003c/code>, \u003ccode>rel_\u003c/code>). Timestamps ISO-8601 text.\u003c/p>\n\u003ch3 id=\"design-sources-immutable-content-addressed\">Sources (immutable, content-addressed) \u003ca class=\"anchor\" href=\"#design-sources-immutable-content-addressed\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cul>\n\u003cli>\u003ccode>sources(id PK, sha256 UNIQUE, stored_path UNIQUE, original_path, title, media_type, byte_size, source_date, author, version_label, supersedes_source_id FK, status CHECK(active|superseded|duplicate|retracted), metadata_json, ingested_at)\u003c/code>\u003c/li>\n\u003cli>Re-ingesting identical bytes → maps to existing source (idempotent no-op).\u003c/li>\n\u003c/ul>\n\u003ch3 id=\"design-chunks-spans-provenance-anchors\">Chunks + spans (provenance anchors) \u003ca class=\"anchor\" href=\"#design-chunks-spans-provenance-anchors\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cul>\n\u003cli>\u003ccode>source_chunks(id PK, source_id FK, chunk_index, heading_path, text, char_start, char_end, token_estimate, content_hash, UNIQUE(source_id, chunk_index))\u003c/code> — deterministic,\nstructure-aware chunking; content-hashed so re-chunking identical bytes is stable.\u003c/li>\n\u003cli>\u003ccode>source_spans(id PK, source_id FK, chunk_id FK, char_start, char_end, quote, quote_hash, created_at)\u003c/code> — \u003cstrong>the atomic provenance target\u003c/strong>. \u003ccode>quote\u003c/code> must be an exact substring of the\nimmutable source text; verified deterministically on insert (\u003ccode>quote_hash\u003c/code> = sha256(quote)).\u003c/li>\n\u003c/ul>\n\u003ch3 id=\"design-synthesis-tree-hierarchy-of-arbitrary-depth\">Synthesis tree (hierarchy of arbitrary depth) \u003ca class=\"anchor\" href=\"#design-synthesis-tree-hierarchy-of-arbitrary-depth\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cul>\n\u003cli>\u003ccode>nodes(id PK, parent_id FK→nodes, slug, title, kind CHECK(root|topic|leaf), depth, sort_order, body_md, body_hash, token_budget, content_rev INT, subtree_rev INT, synthesized_rev INT, status CHECK(fresh|stale), summary, created_at, updated_at, UNIQUE(parent_id, slug))\u003c/code>\u003c/li>\n\u003cli>\u003ccode>node_claims(node_id FK, claim_id FK, relevance, PRIMARY KEY(node_id, claim_id))\u003c/code> — which\nclaims a node synthesizes / is responsible for.\u003c/li>\n\u003cli>\u003cstrong>Staleness via revision counters\u003c/strong> (clean, no LLM needed to detect): \u003ccode>content_rev++\u003c/code> when a\nnode&#39;s own claim set changes; \u003ccode>subtree_rev\u003c/code> = max(own content_rev, children subtree_rev);\nnode is \u003cstrong>stale\u003c/strong> iff \u003ccode>subtree_rev &gt; synthesized_rev\u003c/code>. Propagation walks parent pointers to\nroot. Re-synthesis is bottom-up.\u003c/li>\n\u003c/ul>\n\u003ch3 id=\"design-claims-provenance-the-knowledge-atom\">Claims + provenance (the knowledge atom) \u003ca class=\"anchor\" href=\"#design-claims-provenance-the-knowledge-atom\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cul>\n\u003cli>\u003ccode>claims(id PK, text, normalized_text, claim_type CHECK(fact|definition|decision|requirement| constraint|procedure|warning|example|open_question), subject_entity_id FK?, confidence REAL[0..1], status CHECK(active|superseded|conflicted|retracted), superseded_by_claim_id FK?, first_seen_source_id FK, created_at, updated_at)\u003c/code>\u003c/li>\n\u003cli>\u003ccode>claim_spans(id PK, claim_id FK, source_span_id FK, role CHECK(supports|contradicts|context| supersedes), confidence, extractor CHECK(agent|cli|human), UNIQUE(claim_id, source_span_id, role))\u003c/code> — provenance edges.\u003c/li>\n\u003cli>\u003cstrong>HARD INVARIANT\u003c/strong> (\u003ccode>kb verify --strict\u003c/code>): every \u003ccode>active\u003c/code> claim has ≥1 \u003ccode>supports\u003c/code> span whose\nquote still exactly matches the immutable source (re-verified → catches provenance rot).\u003c/li>\n\u003cli>Node prose cites claims inline: \u003ccode>...rotated on every use.[^c:clm_ab12]\u003c/code>. Render resolves to a\nfootnote with the claim&#39;s source quote + link. \u003ccode>verify\u003c/code> checks every inline citation resolves\nto a claim linked to that node, and every leaf node body has ≥1 claim.\u003c/li>\n\u003c/ul>\n\u003ch3 id=\"design-knowledge-graph\">Knowledge graph \u003ca class=\"anchor\" href=\"#design-knowledge-graph\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cul>\n\u003cli>\u003ccode>entity_types(id PK, name UNIQUE, description)\u003c/code> — seeded software-domain vocabulary.\u003c/li>\n\u003cli>\u003ccode>entities(id PK, type_id FK, canonical_name, normalized_name, description, confidence, UNIQUE(type_id, normalized_name))\u003c/code>\u003c/li>\n\u003cli>\u003ccode>entity_aliases(id PK, entity_id FK, alias, normalized_alias, source_span_id FK?, confidence, UNIQUE(entity_id, normalized_alias))\u003c/code>\u003c/li>\n\u003cli>\u003ccode>relationship_types(id PK, name UNIQUE, domain_type_id FK?, range_type_id FK?, description)\u003c/code>\u003c/li>\n\u003cli>\u003ccode>relationships(id PK, type_id FK, subject_entity_id FK, object_entity_id FK, confidence, status, first_seen_source_id FK, UNIQUE(type_id, subject_entity_id, object_entity_id))\u003c/code>\u003c/li>\n\u003cli>\u003ccode>relationship_spans(id PK, relationship_id FK, source_span_id FK, role, UNIQUE(...))\u003c/code> — KG\nedges carry provenance too (no orphan edges).\u003c/li>\n\u003c/ul>\n\u003ch3 id=\"design-operating-tables\">Operating tables \u003ca class=\"anchor\" href=\"#design-operating-tables\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cul>\n\u003cli>\u003ccode>changelog(id PK, ts, op, actor, source_id?, summary, detail_json)\u003c/code> — every mutation appends.\u003c/li>\n\u003cli>\u003ccode>open_questions(id PK, node_id?, kind CHECK(conflict|gap|ambiguity), text, claim_a?, claim_b?, status, resolution, created_at)\u003c/code>\u003c/li>\n\u003cli>\u003ccode>rendered_files(path PK, node_id?, content_hash, rendered_at)\u003c/code> — drift detection.\u003c/li>\n\u003cli>\u003ccode>meta(k PK, v)\u003c/code> — schema_version etc.\u003c/li>\n\u003c/ul>\n\u003ch3 id=\"design-fts5-agent-retrieval\">FTS5 (agent retrieval) \u003ca class=\"anchor\" href=\"#design-fts5-agent-retrieval\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cul>\n\u003cli>\u003ccode>chunks_fts(text, heading_path)\u003c/code> over \u003ccode>source_chunks\u003c/code>\u003c/li>\n\u003cli>\u003ccode>claims_fts(text)\u003c/code> over \u003ccode>claims\u003c/code>\u003c/li>\n\u003cli>\u003ccode>nodes_fts(title, body_md)\u003c/code> over \u003ccode>nodes\u003c/code>\u003c/li>\n\u003cli>\u003ccode>entities_fts(canonical_name, description)\u003c/code> over \u003ccode>entities\u003c/code>\u003c/li>\n\u003cli>external-content tables kept in sync by triggers.\u003c/li>\n\u003c/ul>\n\u003ch2 id=\"design-3-knowledge-graph-vocabulary-software-technical-domain-extensible\">3. Knowledge-graph vocabulary (software/technical domain, extensible) \u003ca class=\"anchor\" href=\"#design-3-knowledge-graph-vocabulary-software-technical-domain-extensible\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>\u003cstrong>Entity types:\u003c/strong> System, Service, Component, Module, Library, Framework, Language, API,\nEndpoint, Function, Class, DataStore, Schema, Table, Config, Environment, Protocol, Format,\nTool, Concept, Pattern, Decision (ADR), Requirement, Constraint, Risk, Person, Team, Version,\nRepository, File.\u003c/p>\n\u003cp>\u003cstrong>Relationship types:\u003c/strong> depends_on, calls, implements, extends, exposes, consumes, produces,\nstores_in, configured_by, deployed_to, owned_by, authored_by, supersedes, deprecates,\nalternative_to, part_of, references, decided_by, constrains, tested_by, documented_by,\nexample_of, equivalent_to.\u003c/p>\n\u003cp>\u003cstrong>Entity resolution:\u003c/strong> normalize (lowercase, collapse whitespace, strip punctuation/version\nsuffix). Type-specific canonical keys where useful (Function=\u003ccode>module.name\u003c/code>, Endpoint=\u003ccode>METHOD path\u003c/code>, Config=dotted path). Exact \u003ccode>(type, normalized_name)\u003c/code> → auto-merge. Alias hit → same\nentity. Fuzzy candidates (trigram) → agent adjudicates. No cross-type auto-merge. \u003ccode>kb entity merge a b\u003c/code> repoints FKs transactionally (lossless).\u003c/p>\n\u003ch2 id=\"design-4-ingestion-pipeline-deterministic-cli-vs-agent-judgment\">4. Ingestion pipeline (deterministic CLI vs agent judgment) \u003ca class=\"anchor\" href=\"#design-4-ingestion-pipeline-deterministic-cli-vs-agent-judgment\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cdiv class=\"table-wrap\">\u003ctable>\n\u003cthead>\n\u003ctr>\n\u003cth>#\u003c/th>\n\u003cth>Step\u003c/th>\n\u003cth>Owner\u003c/th>\n\u003c/tr>\n\u003c/thead>\n\u003ctbody>\u003ctr>\n\u003ctd>1\u003c/td>\n\u003ctd>Register source: hash, dedup, copy to immutable store, insert \u003ccode>sources\u003c/code>\u003c/td>\n\u003ctd>\u003cstrong>CLI\u003c/strong> deterministic\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>2\u003c/td>\n\u003ctd>Extract text + structure-aware chunk + FTS\u003c/td>\n\u003ctd>\u003cstrong>CLI\u003c/strong> deterministic\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>3\u003c/td>\n\u003ctd>Retrieve neighborhood (FTS + entity aliases) → context bundle\u003c/td>\n\u003ctd>\u003cstrong>CLI\u003c/strong> deterministic\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>4\u003c/td>\n\u003ctd>Extract claims (text, type, confidence, entities, \u003cstrong>span quotes\u003c/strong>) as Zod JSON\u003c/td>\n\u003ctd>\u003cstrong>AGENT\u003c/strong>\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>5\u003c/td>\n\u003ctd>Persist claims: verify each quote ⊆ source, create spans, dedup/normalize\u003c/td>\n\u003ctd>\u003cstrong>CLI\u003c/strong> validates\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>6\u003c/td>\n\u003ctd>Extract entities + relationships as Zod JSON; resolve exact, queue fuzzy\u003c/td>\n\u003ctd>\u003cstrong>AGENT\u003c/strong> + CLI\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>7\u003c/td>\n\u003ctd>Detect conflicts/supersession (same subject, recency, &quot;deprecated&quot;/&quot;replaced by&quot;)\u003c/td>\n\u003ctd>CLI surfaces, \u003cstrong>AGENT\u003c/strong> adjudicates\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>8\u003c/td>\n\u003ctd>Assign claims to nodes (create nodes as needed); bump content_rev; mark stale\u003c/td>\n\u003ctd>\u003cstrong>AGENT\u003c/strong>\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>9\u003c/td>\n\u003ctd>Propagate staleness up the tree\u003c/td>\n\u003ctd>\u003cstrong>CLI\u003c/strong> deterministic\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>10\u003c/td>\n\u003ctd>Re-synthesize stale nodes bottom-up (write body_md + inline claim cites)\u003c/td>\n\u003ctd>\u003cstrong>AGENT\u003c/strong>\u003c/td>\n\u003c/tr>\n\u003ctr>\n\u003ctd>11\u003c/td>\n\u003ctd>\u003ccode>verify --strict\u003c/code> then \u003ccode>render\u003c/code>\u003c/td>\n\u003ctd>\u003cstrong>CLI\u003c/strong> deterministic\u003c/td>\n\u003c/tr>\n\u003c/tbody>\u003c/table>\u003c/div>\n\u003cp>\u003cstrong>Idempotency:\u003c/strong> same bytes → no-op (step 1); same chunk hash → stable IDs; same (normalized\nclaim, span) → no duplicate provenance; same relationship triple → update, no dup. Updated\nsource → new hash, may \u003ccode>--supersedes\u003c/code> old → step 7 supersedes old claims rather than duplicating.\u003c/p>\n\u003cp>\u003cstrong>Conflict handling:\u003c/strong> never silently overwrite. Explicit supersession evidence → old claim\n\u003ccode>superseded\u003c/code>. Disagreement without precedence → both \u003ccode>conflicted\u003c/code>, open question created,\nsynthesis must state the conflict and cite both sides.\u003c/p>\n\u003ch2 id=\"design-5-cli-surface-kb\">5. CLI surface (\u003ccode>kb\u003c/code>) \u003ca class=\"anchor\" href=\"#design-5-cli-surface-kb\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>Output envelope \u003ccode>{ ok, data, warnings, errors }\u003c/code>. \u003ccode>--json\u003c/code> for machine output; default human\ntext. Read commands never mutate; mutations append to \u003ccode>changelog\u003c/code>.\u003c/p>\n\u003cp>\u003cstrong>Lifecycle/ingest (mutation):\u003c/strong> \u003ccode>kb init &lt;dir&gt;\u003c/code> · \u003ccode>kb ingest &lt;path&gt; [--supersedes &lt;id&gt;] [--title T] [--source-date D]\u003c/code> (steps 1–3, prints context bundle) · \u003ccode>kb claim apply &lt;json&gt;\u003c/code>\n(steps 5) · \u003ccode>kb graph apply &lt;json&gt;\u003c/code> (step 6) · \u003ccode>kb node create|move|split\u003c/code> · \u003ccode>kb synthesize &lt;node&gt; &lt;json&gt;\u003c/code> (step 10) · \u003ccode>kb source supersede &lt;old&gt; &lt;new&gt;\u003c/code> · \u003ccode>kb propagate\u003c/code> · \u003ccode>kb render [--check]\u003c/code>.\u003c/p>\n\u003cp>\u003cstrong>Read/query:\u003c/strong> \u003ccode>kb status\u003c/code> · \u003ccode>kb search &lt;q&gt; [--scope sources|claims|nodes|entities]\u003c/code> · \u003ccode>kb source show|chunks &lt;id&gt;\u003c/code> · \u003ccode>kb claim show &lt;id&gt; --with-provenance\u003c/code> · \u003ccode>kb provenance &lt;claim&gt;\u003c/code>\n(full chain to bytes) · \u003ccode>kb node tree|show|stale\u003c/code> · \u003ccode>kb entity show|neighbors &lt;id&gt;\u003c/code> · \u003ccode>kb ask-context &lt;q&gt;\u003c/code> (retrieve claims+nodes+entities+spans for Q&amp;A) · \u003ccode>kb answer-check &lt;json&gt;\u003c/code>\n(reject answer sentences lacking resolvable provenance) · \u003ccode>kb verify [--strict]\u003c/code>.\u003c/p>\n\u003cp>\u003cstrong>Provenance-checked Q&amp;A (the V1 headline):\u003c/strong> \u003ccode>kb ask-context\u003c/code> retrieves; agent answers using\nonly retrieved claims with inline claim cites; \u003ccode>kb answer-check\u003c/code> fails closed on any\nuncited/over-reaching sentence. Answer ships with per-claim source quotes.\u003c/p>\n\u003ch2 id=\"design-6-claude-code-skills\">6. Claude Code skills \u003ca class=\"anchor\" href=\"#design-6-claude-code-skills\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>Four skills (markdown instruction files). Each encodes the \u003cem>judgment\u003c/em> the CLI refuses to make,\nplus a non-negotiables block (don&#39;t trust memory; evidence is source spans; generated markdown\nis output not input; every claim must be traceable).\u003c/p>\n\u003cul>\n\u003cli>\u003cstrong>kb-create\u003c/strong> — bootstrap a KB from a corpus: ingest all sources, extract claims, build the\nhierarchy from source-backed claims, synthesize bottom-up, \u003ccode>verify --strict\u003c/code>, \u003ccode>render\u003c/code>.\u003c/li>\n\u003cli>\u003cstrong>kb-ingest\u003c/strong> — add one new source: the step 1–11 loop; resolve conflicts; update stale\nleaves before parents.\u003c/li>\n\u003cli>\u003cstrong>kb-query\u003c/strong> — answer questions: \u003ccode>ask-context\u003c/code> → draft with claim cites → \u003ccode>answer-check\u003c/code> →\nsay when the KB lacks support.\u003c/li>\n\u003cli>\u003cstrong>kb-maintain\u003c/strong> — repair/refactor: \u003ccode>verify\u003c/code>/\u003ccode>doctor\u003c/code>, fix stale nodes, split oversized nodes,\nresolve low-confidence entity merges, re-render.\u003c/li>\n\u003c/ul>\n\u003ch2 id=\"design-7-type-safety-testing\">7. Type safety + testing \u003ca class=\"anchor\" href=\"#design-7-type-safety-testing\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cul>\n\u003cli>All agent↔CLI JSON validated by \u003cstrong>Zod\u003c/strong> at the boundary; DB rows validated on read into typed\nmodels. No \u003ccode>any\u003c/code>. Branded ID types.\u003c/li>\n\u003cli>\u003cstrong>TDD red/green/refactor\u003c/strong> on the deterministic core: hashing, chunking, normalization, quote\nverification, ID derivation, staleness propagation, provenance graph queries, render,\nsearch, verify invariants. LLM-judgment steps are proven via an end-to-end demo ingest on a\nreal sample source.\u003c/li>\n\u003c/ul>\n\u003ch2 id=\"design-8-cut-from-v1-deferred\">8. Cut from V1 (deferred) \u003ca class=\"anchor\" href=\"#design-8-cut-from-v1-deferred\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>Multi-user, web UI, bidirectional markdown editing, vector/embedding search, background daemon,\nsource deletion, multi-KB federation, full sentence-level (vs claim-level) prose decomposition,\nautomatic ontology learning. V1 ships: immutable sources, chunking+FTS, quote-verified claim\nextraction, synthesis hierarchy with revision-counter staleness, claim→span→source provenance,\nread-only markdown render, conflict/supersession, basic KG, the four skills, provenance-checked\nQ&amp;A.\u003c/p>\n\u003cp>\u003cstrong>Guiding principle:\u003c/strong> \u003cem>make unsupported knowledge impossible to persist through normal commands.\u003c/em>\u003c/p>\n\u003chr>\n\u003ch2 id=\"design-9-final-scope-decisions-post-review-the-implementation-contract\">9. Final scope decisions (post-review) — the implementation contract \u003ca class=\"anchor\" href=\"#design-9-final-scope-decisions-post-review-the-implementation-contract\" aria-label=\"Link to section\">#\u003c/a>\u003c/h2>\n\u003cp>Synthesized from three reviews (internal simplicity + software-engineering reviewers, and Codex).\nWhere this section differs from §0–§8 above, \u003cstrong>this section wins\u003c/strong>.\u003c/p>\n\u003ch3 id=\"design-protected-do-not-weaken\">Protected (do not weaken) \u003ca class=\"anchor\" href=\"#design-protected-do-not-weaken\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>SQLite-as-truth + deterministic markdown projection + the hard boundary where the agent only\n\u003cem>proposes\u003c/em> Zod-validated JSON and the CLI \u003cem>validates &amp; persists\u003c/em>. This is what makes provenance,\nTDD, and repair feasible.\u003c/p>\n\u003ch3 id=\"design-provenance-keystone-keep-quote-verification-rejected-the-cut\">Provenance keystone — KEEP quote verification (rejected the cut) \u003ca class=\"anchor\" href=\"#design-provenance-keystone-keep-quote-verification-rejected-the-cut\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>The atomic provenance unit is a \u003cstrong>span\u003c/strong> = an exact substring of a source&#39;s \u003cstrong>canonical\nextracted text\u003c/strong>, addressed by \u003ccode>[char_start, char_end)\u003c/code> in \u003cstrong>JS UTF-16 code-unit\u003c/strong> offsets.\nIts purpose is \u003cem>anti-hallucination\u003c/em>, not anti-rot: the agent must copy an exact substring, which\nthe CLI verifies deterministically before persisting. No flag skips it.\u003c/p>\n\u003cul>\n\u003cli>New table \u003ccode>source_texts(source_id PK, extractor, extractor_version, text, text_hash)\u003c/code> holds the\ncanonical text. Offsets/quotes are defined against \u003ccode>source_texts.text\u003c/code>, never raw bytes.\u003c/li>\n\u003cli>Canonical normalization for markdown/text extractor: strip BOM, CRLF→LF, Unicode NFC. Documented\nand versioned (\u003ccode>extractor_version\u003c/code>). Code/config use the same (no whitespace collapse).\u003c/li>\n\u003cli>\u003ccode>quote_hash = sha256(quote)\u003c/code>; \u003ccode>verify --strict\u003c/code> re-runs the actual substring check, not just the\nhash compare.\u003c/li>\n\u003c/ul>\n\u003ch3 id=\"design-staleness-boolean-not-counters-adopted-the-simplification-fixes-two-flagged-bugs\">Staleness — boolean, not counters (adopted the simplification; fixes two flagged bugs) \u003ca class=\"anchor\" href=\"#design-staleness-boolean-not-counters-adopted-the-simplification-fixes-two-flagged-bugs\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>\u003ccode>nodes.is_stale INTEGER\u003c/code>. Marking any node&#39;s claim set / structure dirty marks that node + all\nancestors stale (\u003ccode>WITH RECURSIVE\u003c/code>, one transaction). Move/split/merge marks \u003cstrong>old-parent chain +\nnew-parent chain + the moved/split nodes\u003c/strong>. Re-synthesis is bottom-up: \u003ccode>WHERE is_stale ORDER BY depth DESC\u003c/code>. This removes the counter-miscount race entirely.\u003c/p>\n\u003ch3 id=\"design-final-table-set-core\">Final table set (core) \u003ca class=\"anchor\" href=\"#design-final-table-set-core\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>\u003ccode>meta\u003c/code>, \u003ccode>sources\u003c/code>, \u003ccode>source_texts\u003c/code>, \u003ccode>source_chunks\u003c/code>, \u003ccode>spans\u003c/code>, \u003ccode>nodes\u003c/code>, \u003ccode>claims\u003c/code>, \u003ccode>claim_spans\u003c/code>,\n\u003ccode>entities\u003c/code>, \u003ccode>relationships\u003c/code>, \u003ccode>relationship_spans\u003c/code>, \u003ccode>changelog\u003c/code>, \u003ccode>rendered_files\u003c/code>.\nFTS5 (external-content, 3 triggers each: insert / delete / update): \u003ccode>chunks_fts\u003c/code>, \u003ccode>claims_fts\u003c/code>,\n\u003ccode>nodes_fts\u003c/code>.\n\u003cstrong>Dropped from §2 for V1:\u003c/strong> \u003ccode>entity_types\u003c/code>/\u003ccode>relationship_types\u003c/code> (type is TEXT + a recommended\nvocabulary the skill documents), \u003ccode>entity_aliases\u003c/code>, \u003ccode>node_claims\u003c/code> join (claims carry \u003ccode>node_id\u003c/code>\ndirectly — one owning leaf per claim), \u003ccode>open_questions\u003c/code> table (conflicts live as claim\n\u003ccode>status=&#39;conflicted&#39;\u003c/code> + \u003ccode>superseded_by_claim_id\u003c/code>; \u003ccode>open-questions.md\u003c/code> is rendered from those),\n\u003ccode>token_budget\u003c/code>, revision-counter columns, \u003ccode>entities_fts\u003c/code>.\u003c/p>\n\u003ch3 id=\"design-knowledge-graph-first-class-but-lean\">Knowledge graph — first-class but lean \u003ca class=\"anchor\" href=\"#design-knowledge-graph-first-class-but-lean\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>Entities &amp; relationships stay first-class (hard requirement #13). \u003ccode>type\u003c/code>/relationship-\u003ccode>type\u003c/code> are\nTEXT validated against a recommended-but-extensible vocabulary (§3) — no FK lookup tables.\nResolution = exact \u003ccode>(type, normalized_name)\u003c/code> match, normalized = lowercase + collapse internal\nwhitespace, \u003cstrong>no version stripping\u003c/strong> (versions are identity: \u003ccode>React 18\u003c/code> ≠ \u003ccode>React\u003c/code>). No fuzzy\nauto-merge in V1; \u003ccode>kb entity merge &lt;a&gt; &lt;b&gt;\u003c/code> is an explicit, audited, FK-repoint op. Relationships\ncarry provenance via \u003ccode>relationship_spans\u003c/code>.\u003c/p>\n\u003ch3 id=\"design-inline-citations-agent-writes-refs-cli-generates-footnotes\">Inline citations — agent writes refs, CLI generates footnotes \u003ca class=\"anchor\" href=\"#design-inline-citations-agent-writes-refs-cli-generates-footnotes\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>Node \u003ccode>body_md\u003c/code> carries GFM footnote refs \u003ccode>[^clm_&lt;id&gt;]\u003c/code> only. The renderer GENERATES the footnote\ndefinitions from the DB (agent never authors them). \u003ccode>verify\u003c/code> extracts refs by fixed regex and\nchecks each resolves to a claim that is (a) \u003ccode>active\u003c/code> (conflict callouts may cite \u003ccode>conflicted\u003c/code>\npairs), and (b) owned by the node (leaf) or present in its subtree (parent). Every leaf node body\nmust carry ≥1 ref. Parent nodes may cite any claim in their subtree (provenance stays monotonic).\u003c/p>\n\u003ch3 id=\"design-idempotency-natural-keys-upsert-report-created-updated-unchanged\">Idempotency — natural keys + upsert, report created/updated/unchanged \u003ca class=\"anchor\" href=\"#design-idempotency-natural-keys-upsert-report-created-updated-unchanged\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>Every \u003ccode>apply\u003c/code> command runs in ONE \u003ccode>BEGIN IMMEDIATE\u003c/code> transaction and returns\n\u003ccode>{created, updated, unchanged}\u003c/code> counts. Natural keys: source by \u003ccode>sha256\u003c/code>; chunk by\n\u003ccode>(source_id, chunk_index)\u003c/code> over versioned chunker; span by \u003ccode>(source_id, char_start, char_end)\u003c/code>;\nclaim by \u003ccode>(node_id, normalized_text)\u003c/code>; claim_span by \u003ccode>(claim_id, span_id, role)\u003c/code>; entity by\n\u003ccode>(type, normalized_name)\u003c/code>; relationship by \u003ccode>(type, subject, object)\u003c/code>. Re-ingesting identical bytes\nwith new metadata updates metadata only (same \u003ccode>source_id\u003c/code>), reports \u003ccode>unchanged|updated\u003c/code>.\n\u003ccode>kb synthesize\u003c/code> sets the node fresh and no-ops on an unchanged \u003ccode>(body_md, ref-set)\u003c/code>.\u003c/p>\n\u003ch3 id=\"design-answer-check-structural-provenance-only-honest-scope\">answer-check — structural/provenance only (honest scope) \u003ca class=\"anchor\" href=\"#design-answer-check-structural-provenance-only-honest-scope\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>Deterministic checks: every answer claim-ref resolves to an \u003ccode>active\u003c/code>, span-backed claim; flag\nassertive answer sentences with no ref. Semantic entailment / &quot;over-reach&quot; detection needs an\nNLI/LLM step → deferred. Documented as such.\u003c/p>\n\u003ch3 id=\"design-render-determinism\">Render determinism \u003ca class=\"anchor\" href=\"#design-render-determinism\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>No wall-clock in rendered file bodies (all timestamps come from stored DB rows). Canonical order\n\u003ccode>ORDER BY sort_order, id\u003c/code>. Render header carries \u003ccode>content_hash\u003c/code> (sha256 of the file body sans\nheader). \u003ccode>kb render --check\u003c/code> recomputes &amp; compares against \u003ccode>rendered_files\u003c/code>. \u003ccode>Object\u003c/code> keys sorted\nin any serialized JSON.\u003c/p>\n\u003ch3 id=\"design-schema-version-gate\">Schema/version gate \u003ca class=\"anchor\" href=\"#design-schema-version-gate\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>\u003ccode>meta(schema_version)\u003c/code>; every command opens the DB through a guard that errors if the on-disk\n\u003ccode>schema_version\u003c/code> is newer than the binary supports. \u003ccode>kb init\u003c/code> writes it; migration runner is\nidempotent and records applied versions.\u003c/p>\n\u003ch3 id=\"design-module-decomposition-build-order-tdd\">Module decomposition &amp; build order (TDD) \u003ca class=\"anchor\" href=\"#design-module-decomposition-build-order-tdd\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>Layers (deps flow downward only): \u003ccode>db/\u003c/code> (connection, migrations, repositories) → \u003ccode>domain/schemas\u003c/code>\n(branded ids, row schemas, agent-payload schemas) → \u003ccode>domain/algorithms\u003c/code> (PURE: hash, chunker,\nnormalizer, idDeriver, quoteVerifier, offsetMapper, staleness) → \u003ccode>domain/services\u003c/code> (Ingest, Claim,\nNode, Entity, Provenance, Staleness; repos + a \u003ccode>SourceStore\u003c/code> injected) → \u003ccode>render\u003c/code>/\u003ccode>search\u003c/code>/\u003ccode>verify\u003c/code>\n→ \u003ccode>cli\u003c/code>. Build/test order: (1) connection+migrations+source/chunk repos, (2) pure algorithms to\n~full branch coverage, (3) Ingest+Claim services with the atomicity &amp; quote-verify tests,\n(4) Node+Staleness, (5) search+verify, (6) render, (7) CLI commands, (8) skills + e2e demo ingest.\u003c/p>\n\u003ch3 id=\"design-skills-three\">Skills — three \u003ca class=\"anchor\" href=\"#design-skills-three\" aria-label=\"Link to section\">#\u003c/a>\u003c/h3>\n\u003cp>\u003ccode>kb-create\u003c/code>, \u003ccode>kb-ingest\u003c/code>, \u003ccode>kb-query\u003c/code> (project-local under \u003ccode>.claude/skills/\u003c/code>, wrapping the \u003ccode>kb\u003c/code>\nCLI). Maintenance guidance folds into a section of each.\u003c/p>\n","toc":[{"level":2,"text":"0. Core decision: SQLite is the source of truth; markdown is a rendered projection","id":"design-0-core-decision-sqlite-is-the-source-of-truth-markdown-is-a-rendered-projection"},{"level":2,"text":"1. On-disk layout","id":"design-1-on-disk-layout"},{"level":2,"text":"2. SQLite schema (authoritative)","id":"design-2-sqlite-schema-authoritative"},{"level":3,"text":"Sources (immutable, content-addressed)","id":"design-sources-immutable-content-addressed"},{"level":3,"text":"Chunks + spans (provenance anchors)","id":"design-chunks-spans-provenance-anchors"},{"level":3,"text":"Synthesis tree (hierarchy of arbitrary depth)","id":"design-synthesis-tree-hierarchy-of-arbitrary-depth"},{"level":3,"text":"Claims + provenance (the knowledge atom)","id":"design-claims-provenance-the-knowledge-atom"},{"level":3,"text":"Knowledge graph","id":"design-knowledge-graph"},{"level":3,"text":"Operating tables","id":"design-operating-tables"},{"level":3,"text":"FTS5 (agent retrieval)","id":"design-fts5-agent-retrieval"},{"level":2,"text":"3. Knowledge-graph vocabulary (software/technical domain, extensible)","id":"design-3-knowledge-graph-vocabulary-software-technical-domain-extensible"},{"level":2,"text":"4. Ingestion pipeline (deterministic CLI vs agent judgment)","id":"design-4-ingestion-pipeline-deterministic-cli-vs-agent-judgment"},{"level":2,"text":"5. CLI surface (kb)","id":"design-5-cli-surface-kb"},{"level":2,"text":"6. Claude Code skills","id":"design-6-claude-code-skills"},{"level":2,"text":"7. Type safety + testing","id":"design-7-type-safety-testing"},{"level":2,"text":"8. Cut from V1 (deferred)","id":"design-8-cut-from-v1-deferred"},{"level":2,"text":"9. Final scope decisions (post-review) — the implementation contract","id":"design-9-final-scope-decisions-post-review-the-implementation-contract"},{"level":3,"text":"Protected (do not weaken)","id":"design-protected-do-not-weaken"},{"level":3,"text":"Provenance keystone — KEEP quote verification (rejected the cut)","id":"design-provenance-keystone-keep-quote-verification-rejected-the-cut"},{"level":3,"text":"Staleness — boolean, not counters (adopted the simplification; fixes two flagged bugs)","id":"design-staleness-boolean-not-counters-adopted-the-simplification-fixes-two-flagged-bugs"},{"level":3,"text":"Final table set (core)","id":"design-final-table-set-core"},{"level":3,"text":"Knowledge graph — first-class but lean","id":"design-knowledge-graph-first-class-but-lean"},{"level":3,"text":"Inline citations — agent writes refs, CLI generates footnotes","id":"design-inline-citations-agent-writes-refs-cli-generates-footnotes"},{"level":3,"text":"Idempotency — natural keys + upsert, report created/updated/unchanged","id":"design-idempotency-natural-keys-upsert-report-created-updated-unchanged"},{"level":3,"text":"answer-check — structural/provenance only (honest scope)","id":"design-answer-check-structural-provenance-only-honest-scope"},{"level":3,"text":"Render determinism","id":"design-render-determinism"},{"level":3,"text":"Schema/version gate","id":"design-schema-version-gate"},{"level":3,"text":"Module decomposition & build order (TDD)","id":"design-module-decomposition-build-order-tdd"},{"level":3,"text":"Skills — three","id":"design-skills-three"}]}]</script>
<script>
(function(){
  "use strict";
  const DOCS = JSON.parse(document.getElementById('docs-data').textContent);
  const byId = Object.fromEntries(DOCS.map(d=>[d.id,d]));
  const tabsEl=document.getElementById('tabs'), tocEl=document.getElementById('toc'),
        mainEl=document.getElementById('main'), searchEl=document.getElementById('search'),
        progressEl=document.getElementById('progress');
  let current=null, observer=null;

  const SUN='<circle cx="12" cy="12" r="4.2"/><path d="M12 2v2.2M12 19.8V22M4.9 4.9l1.6 1.6M17.5 17.5l1.6 1.6M2 12h2.2M19.8 12H22M4.9 19.1l1.6-1.6M17.5 6.5l1.6-1.6"/>';
  const MOON='<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/>';

  /* ---- theme ---- */
  function setTheme(t){
    document.documentElement.setAttribute('data-theme',t);
    document.getElementById('themeIcon').innerHTML = t==='dark'?SUN:MOON;
    try{localStorage.setItem('kb-docs-theme',t)}catch(e){}
  }
  const saved=(()=>{try{return localStorage.getItem('kb-docs-theme')}catch(e){return null}})();
  setTheme(saved || (matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light'));
  document.getElementById('themeBtn').onclick=()=>setTheme(document.documentElement.getAttribute('data-theme')==='dark'?'light':'dark');

  /* ---- tabs ---- */
  DOCS.forEach(d=>{
    const b=document.createElement('button'); b.className='tab'; b.textContent=d.title; b.dataset.doc=d.id;
    b.onclick=()=>show(d.id,true); tabsEl.appendChild(b);
  });

  /* ---- render a doc ---- */
  function show(id, push){
    const doc=byId[id]; if(!doc) return;
    current=id;
    document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.doc===id));
    mainEl.innerHTML='<article class="doc active">'+doc.html+'<div class="foot">Generated from the Markdown sources · '+doc.title+'</div></article>';
    buildToc(doc);
    wireCode();
    setupSpy();
    searchEl.value=''; filterToc('');
    if(push) history.replaceState(null,'','#'+id);
    window.scrollTo({top:0});
    closeSidebar();
  }

  function buildToc(doc){
    tocEl.innerHTML='';
    if(!doc.toc.length){tocEl.innerHTML='<li class="empty">No sections</li>';return;}
    doc.toc.forEach(h=>{
      const li=document.createElement('li'); const a=document.createElement('a');
      a.href='#'+h.id; a.textContent=h.text; a.className=(h.level===3?'h3':'h2'); a.dataset.target=h.id;
      a.onclick=e=>{e.preventDefault(); const el=document.getElementById(h.id);
        if(el){el.scrollIntoView({behavior:'smooth',block:'start'}); history.replaceState(null,'','#'+h.id);} closeSidebar();};
      li.appendChild(a); tocEl.appendChild(li);
    });
  }

  /* ---- scroll spy ---- */
  function setupSpy(){
    if(observer) observer.disconnect();
    const heads=[...mainEl.querySelectorAll('h2[id],h3[id]')];
    const links=new Map([...tocEl.querySelectorAll('a')].map(a=>[a.dataset.target,a]));
    observer=new IntersectionObserver((ents)=>{
      ents.forEach(en=>{ if(en.isIntersecting){
        links.forEach(a=>a.classList.remove('active'));
        const a=links.get(en.target.id); if(a){a.classList.add('active');
          a.scrollIntoView({block:'nearest'});}
      }});
    },{rootMargin:'-72px 0px -70% 0px', threshold:0});
    heads.forEach(h=>observer.observe(h));
  }

  /* ---- code copy ---- */
  function wireCode(){
    mainEl.querySelectorAll('figure.code .copy').forEach(btn=>{
      btn.onclick=()=>{
        const code=btn.closest('figure').querySelector('code');
        navigator.clipboard.writeText(code.textContent).then(()=>{
          const t=btn.textContent; btn.textContent='Copied'; btn.classList.add('ok');
          setTimeout(()=>{btn.textContent=t; btn.classList.remove('ok')},1300);
        }).catch(()=>{});
      };
    });
    // in-page doc links
    mainEl.querySelectorAll('a[data-doc]').forEach(a=>{
      a.onclick=e=>{e.preventDefault(); show(a.dataset.doc,true);};
    });
  }

  /* ---- sidebar filter ---- */
  function filterToc(q){
    q=q.trim().toLowerCase();
    let any=false;
    tocEl.querySelectorAll('li').forEach(li=>{
      const a=li.querySelector('a'); if(!a) return;
      const hit=!q || a.textContent.toLowerCase().includes(q);
      li.style.display=hit?'':'none'; if(hit) any=true;
    });
  }
  searchEl.addEventListener('input',e=>filterToc(e.target.value));
  searchEl.addEventListener('keydown',e=>{
    if(e.key==='Enter'){ const first=[...tocEl.querySelectorAll('li')].find(li=>li.style.display!=='none');
      const a=first&&first.querySelector('a'); if(a){a.click();} }
    if(e.key==='Escape'){ searchEl.value=''; filterToc(''); searchEl.blur(); }
  });
  document.addEventListener('keydown',e=>{
    if(e.key==='/' && document.activeElement!==searchEl){e.preventDefault(); searchEl.focus();}
  });

  /* ---- progress bar ---- */
  function onScroll(){
    const h=document.documentElement;
    const max=h.scrollHeight-h.clientHeight;
    progressEl.style.width=(max>0?(h.scrollTop/max*100):0)+'%';
  }
  document.addEventListener('scroll',onScroll,{passive:true}); onScroll();

  /* ---- mobile sidebar ---- */
  const sidebar=document.getElementById('sidebar'), overlay=document.getElementById('overlay');
  function closeSidebar(){sidebar.classList.remove('open'); overlay.classList.remove('show');}
  document.getElementById('menuBtn').onclick=()=>{sidebar.classList.toggle('open'); overlay.classList.toggle('show');};
  overlay.onclick=closeSidebar;

  /* ---- initial route ---- */
  function route(){
    const hash=location.hash.replace(/^#/,'');
    if(byId[hash]){ show(hash,false); return; }
    if(hash){ // maybe a section id "docId-slug"
      const doc=DOCS.find(d=>d.toc.some(t=>t.id===hash) || hash.startsWith(d.id+'-'));
      if(doc){ show(doc.id,false); requestAnimationFrame(()=>{const el=document.getElementById(hash); if(el) el.scrollIntoView();}); return; }
    }
    show(DOCS[0].id,false);
  }
  window.addEventListener('hashchange',()=>{ const h=location.hash.replace(/^#/,''); if(byId[h]&&h!==current) show(h,false); });
  route();
})();
</script>
</body>
